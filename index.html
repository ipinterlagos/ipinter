    async function configuracoesAnalise(tipo) {
      const res = document.getElementById('main-result');
      res.innerHTML = '<div class="vazio-central"><p>Analisando banco de dados...</p></div>';

      const { data: Membros } = await supabase.from('membros').select('*');
      if (!Membros) return;

      let sugestões = [];

      if (tipo === 'genero') {
        const mascNames = ['JOAO', 'PAULO', 'PEDRO', 'LUCAS', 'MATEUS', 'RHYAN', 'RYAN', 'MARCOS', 'JOSE', 'CARLOS', 'ANDRE', 'RICARDO', 'BRUNO', 'FELIPE', 'GABRIEL', 'RAFAEL', 'DANIEL', 'SAMUEL', 'ISAAC', 'CAIO', 'THIAGO', 'TIAGO', 'VITOR', 'VICTOR', 'RODRIGO'];
        const femNames = ['MARIA', 'ANA', 'SARA', 'LUCIANA', 'AMANDA', 'RAFAELA', 'REBECA', 'MYLENA', 'EMILLY', 'NYCOLEE', 'ESTHER', 'JULIA', 'BEATRIZ', 'ALICE', 'LAURA', 'HELENA', 'FERNANDA'];

        Membros.forEach(m => {
          const sRaw = (m.sexo || '').toUpperCase();
          const curM = (sRaw === 'M' || sRaw.startsWith('MASC'));
          const curF = (sRaw === 'F' || sRaw.startsWith('FEM'));

          const primeiroNome = m.nome.split(' ')[0].toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
          let sugerido = null;

          if (mascNames.some(n => primeiroNome === n)) sugerido = 'M';
          else if (femNames.some(n => primeiroNome === n)) sugerido = 'F';
          else {
            if (primeiroNome.endsWith('O') || primeiroNome.endsWith('AO')) sugerido = 'M';
            else if (primeiroNome.endsWith('A') || primeiroNome.endsWith('IA')) sugerido = 'F';
          }

          const atualJaCorreto = (sugerido === 'M' && curM) || (sugerido === 'F' && curF);

          if (sugerido && !atualJaCorreto) {
            sugestões.push({ id: m.id, nome: m.nome, atual: m.sexo || '', novo: sugerido });
          }
        });
      } else if (tipo === 'campos') {
        const keywords = ['SOLTEIRO', 'CASADO', 'DIVORCIADO', 'VIUVO', 'SOLT', 'CASA'];
        Membros.forEach(m => {
          const tel = (m.telefone || '').toUpperCase();
          const cel = (m.celular || '').toUpperCase();
          if (keywords.some(k => tel.includes(k) || cel.includes(k))) {
            sugestões.push({ id: m.id, nome: m.nome, campo: tel.includes('SOLT') || tel.includes('CASA') ? 'Telefone' : 'Celular', valor: tel.includes('SOLT') || tel.includes('CASA') ? m.telefone : m.celular });
          }
        });
      } else if (tipo === 'rebalancear') {
        Membros.forEach(m => {
          const cid = (m.cidade || '').toUpperCase();
          const bai = (m.bairro || '').toUpperCase();
          const cel = (m.celular || '').toUpperCase();
          const keywords = ['SOLTEIRO', 'CASADO', 'DIVORCIADO', 'VIUVO', 'SOLT', 'CASA'];

          if (cid === 'ES' || bai.startsWith('LINHA') || keywords.some(k => cel.includes(k))) {
            sugestões.push({
              id: m.id,
              nome: m.nome,
              original: `Bai: ${m.bairro || ''} | Cid: ${m.cidade || ''} | Cel: ${m.celular || ''}`,
              novo: {
                cidade: (bai.startsWith('LINHA') ? 'Linhares' : m.cidade),
                uf: (cid === 'ES' ? 'ES' : m.uf),
                estado_civil: (keywords.some(k => cel.includes(k)) ? m.celular : m.estado_civil),
                celular: (keywords.some(k => cel.includes(k)) ? null : m.celular)
              }
            });
          }
        });
      }

      if (sugestões.length === 0) {
        res.innerHTML = '<div class="vazio-central"><p> Tudo certo! Nenhuma inconsistência detectada.</p></div>';
        return;
      }

      let html = `
            <div class="maintenance-item" style="border-top: 4px solid var(--verde-cor)">
                <h3> ${sugestões.length} sugestões encontradas</h3>
                <table class="suggestion-table">
                    <thead><table><th>MEMBRO</th><th>Estado Atual</th><th>Ação Sugerida</th><th><input type="checkbox" checked onclick="document.querySelectorAll('.chk-m').forEach(c=>c.checked=this.checked)"></th></tr></thead>
                    <tbody>
        `;

      sugestões.forEach((s, idx) => {
        if (tipo === 'genero') {
          html += `
                    <tr>
                        <td>${s.nome}</td>
                        <td><span class="badge-suggest badge-old">${s.atual === 'M' ? 'Masc' : 'Fem'}</span></td>
                        <td><span class="badge-suggest badge-new">${s.novo === 'M' ? 'Masc' : 'Fem'}</span></td>
                        <td><input type="checkbox" class="chk-m" data-id="${s.id}" data-val="${s.novo}" checked></td>
                    </tr>
                `;
        } else if (tipo === 'campos') {
          html += `
                    <tr>
                        <td>${s.nome}</td>
                        <td><span class="badge-suggest badge-old">${s.campo}</span></td>
                        <td><span style="color:#d32f2f; font-weight:600">${s.valor}</span></td>
                        <td><input type="checkbox" class="chk-m" data-id="${s.id}" data-val="null" checked></td>
                    </tr>
                `;
        } else if (tipo === 'rebalancear') {
          html += `
                    <tr>
                        <td style="width:200px"><strong>${s.nome}</strong></td>
                        <td style="font-size:0.7rem; color:#666">${s.original}</td>
                        <td style="font-size:0.7rem; color:var(--verde-cor)">Mover dados para colunas corretas (Cid/UF/Est.Civil)</td>
                        <td><input type="checkbox" class="chk-m" data-id="${s.id}" data-json='${JSON.stringify(s.novo)}' checked></td>
                    </tr>
                `;
        }
      });

      html += `</tbody></table>
            <div style="margin-top:20px; display:flex; gap:10px">
                <button class="btn-primary" onclick="window._cfg.executar('${tipo}')">Aplicar Correções Selecionadas</button>
            </div></div>`;
      res.innerHTML = html;
    }

    async function configuracoesExecutar(tipo) {
      const items = document.querySelectorAll('.chk-m:checked');
      if (items.length === 0) return;
      if (!confirm(`Aplicar ${items.length} correções?`)) return;

      const btn = event.target;
      btn.disabled = true; btn.textContent = 'Processando...';

      try {
        for (const item of items) {
          const id = item.dataset.id;

          if (tipo === 'genero') {
            await supabase.from('membros').update({ sexo: item.dataset.val }).eq('id', id);
          } else if (tipo === 'campos') {
            await supabase.from('membros').update({ telefone: null, celular: null }).eq('id', id);
          } else if (tipo === 'rebalancear') {
            const dados = JSON.parse(item.dataset.json);
            await supabase.from('membros').update(dados).eq('id', id);
          }
        }
        alert('Correções aplicadas com sucesso!');
        configuracoesAnalise(tipo);
      } catch (e) {
        alert('Erro ao aplicar: ' + e.message);
      } finally {
        btn.disabled = false; btn.textContent = 'Aplicar Selecionados';
      }
    }

async function cfgExecutarReassociacao() {
  const nomeErrado = document.getElementById('nome-errado')?.value.trim();
  const nomeCorreto = document.getElementById('nome-correto')?.value.trim();
  const resultadoDiv = document.getElementById('reassoc-resultado');
  
  if (!nomeErrado || !nomeCorreto) {
    if (resultadoDiv) resultadoDiv.innerHTML = '<span class="erro">Preencha ambos os nomes.</span>';
    return;
  }
  
  // 1. Procurar pessoa correta (membro ou visitante)
  let pessoaCorreta = null;
  let tipoCorreto = null;
  
  const { data: membroCorreto } = await supabase
    .from('membros')
    .select('id, nome')
    .ilike('nome', nomeCorreto)
    .maybeSingle();
    
  if (membroCorreto) {
    pessoaCorreta = membroCorreto;
    tipoCorreto = 'membro';
  } else {
    const { data: visitanteCorreto } = await supabase
      .from('visitantes')
      .select('id, nome')
      .ilike('nome', nomeCorreto)
      .maybeSingle();
      
    if (visitanteCorreto) {
      pessoaCorreta = visitanteCorreto;
      tipoCorreto = 'visitante';
    }
  }
  
  if (!pessoaCorreta) {
    if (resultadoDiv) resultadoDiv.innerHTML = '<span class="erro">Nome correto não encontrado no rol de membros nem de visitantes.</span>';
    return;
  }
  
  // 2. Procurar pessoa errada (membro ou visitante)
  let pessoaErrada = null;
  let tipoErrada = null;
  
  const { data: membroErrado } = await supabase
    .from('membros')
    .select('id, nome')
    .ilike('nome', nomeErrado)
    .maybeSingle();
    
  if (membroErrado) {
    pessoaErrada = membroErrado;
    tipoErrada = 'membro';
  } else {
    const { data: visitanteErrado } = await supabase
      .from('visitantes')
      .select('id, nome')
      .ilike('nome', nomeErrado)
      .maybeSingle();
      
    if (visitanteErrado) {
      pessoaErrada = visitanteErrado;
      tipoErrada = 'visitante';
    }
  }
  
  if (!pessoaErrada) {
    if (resultadoDiv) resultadoDiv.innerHTML = '<span class="erro">Nome errado não encontrado no banco de dados.</span>';
    return;
  }
  
  // 3. Evitar reassociar pessoa para si mesma
  if (pessoaCorreta.id === pessoaErrada.id && tipoCorreto === tipoErrada) {
    if (resultadoDiv) resultadoDiv.innerHTML = '<span class="erro">O nome correto e o nome errado referem-se à mesma pessoa no banco.</span>';
    return;
  }
  
  // 4. Configurar payload da reassociacao
  const updatePayload = {};
  if (tipoCorreto === 'membro') {
    updatePayload.membro_id = pessoaCorreta.id;
    updatePayload.visitante_id = null;
  } else {
    updatePayload.membro_id = null;
    updatePayload.visitante_id = pessoaCorreta.id;
  }
  
  let updateQuery;
  if (tipoErrada === 'membro') {
    updateQuery = supabase
      .from('lancamentos')
      .update(updatePayload, { count: 'exact' })
      .eq('membro_id', pessoaErrada.id);
  } else {
    updateQuery = supabase
      .from('lancamentos')
      .update(updatePayload, { count: 'exact' })
      .eq('visitante_id', pessoaErrada.id);
  }
  
  const { error: updateError, count } = await updateQuery;
  if (updateError) {
    if (resultadoDiv) resultadoDiv.innerHTML = `<span class="erro">Erro ao atualizar lançamentos: ${updateError.message}</span>`;
    return;
  }
  
  let mensagem = '';
  if (tipoErrada === 'visitante') {
    await supabase.from('visitantes').delete().eq('id', pessoaErrada.id);
    mensagem = `✅ ${count || 0} lançamento(s) reassociado(s) de "${nomeErrado}" para "${pessoaCorreta.nome}". O visitante incorreto foi removido.`;
  } else if (tipoErrada === 'membro') {
    mensagem = `✅ ${count || 0} lançamento(s) reassociado(s) de "${nomeErrado}" para "${pessoaCorreta.nome}". O membro errado ainda existe no rol; se desejar, exclua‑o manualmente.`;
  } else {
    mensagem = `✅ ${count || 0} lançamento(s) reassociado(s).`;
  }
  
  if (resultadoDiv) resultadoDiv.innerHTML = `<span class="sucesso">${mensagem}</span>`;
  cfgAbrirCorrecaoNomes(); // recarrega a interface
}

    async function overviewCarregar() {
      // Destruir instâncias anteriores
      Object.values(chartInstances).forEach(i => i.destroy());

      const { data: Membros } = await supabase.from('membros').select('*');
      const { data: fin } = await supabase.from('lancamentos').select('valor, tipo, data');

      if (!Membros) return;

      // Cálculos base
      const total = Membros.length;
      const n_Membros = Membros.filter(m => m.tipo === 'Comungante').length;
      const n_nao_Membros = Membros.filter(m => m.tipo === 'Não Comungante').length;
      const n_inativos = Membros.filter(m => m.status_MEMBRO === 'Inativo').length;

      const masc = Membros.filter(m => m.sexo === 'M').length;
      const fem = Membros.filter(m => m.sexo === 'F').length;

      const hoje = new Date();
      const esteAno = hoje.getFullYear();

      // Financeiro
      const mesAtual = hoje.getMonth() + 1;
      const finMeses = (fin || []).filter(l => {
        if (!l.data) return false;
        const [y, m] = l.data.split('-');
        return parseInt(m) === mesAtual && parseInt(y) === esteAno;
      });

      // Calculate financials
      const totalEntradas = finMeses
        .filter(l => l.tipo === 'entrada')
        .reduce((acc, cur) => acc + Number(cur.valor), 0);
      const totalSaidas = finMeses
        .filter(l => l.tipo === 'saida')
        .reduce((acc, cur) => acc + Number(cur.valor), 0);
      const saldoMes = totalEntradas - totalSaidas;

      // Update UI - Membros Section
      const dMaiores = document.getElementById('dash-tot-maiores');
      const dMenores = document.getElementById('dash-tot-menores');
      const dSaldo = document.getElementById('dash-tot-saldo');
      
      if (dMaiores) dMaiores.textContent = n_Membros;
      if (dMenores) dMenores.textContent = n_nao_Membros;
      const totalMembros = n_Membros + n_nao_Membros;
      if (dSaldo) dSaldo.textContent = totalMembros;

      // Update UI - Financial Section
      const fEnt = document.getElementById('fin-entrada-mes');
      const fSai = document.getElementById('fin-saida-mes');
      const fSal = document.getElementById('fin-saldo-mes');

      if (fEnt) fEnt.textContent = totalEntradas.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
      if (fSai) fSai.textContent = totalSaidas.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
      if (fSal) fSal.textContent = saldoMes.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

      const vMem = document.getElementById('val-Membros');
      const vNao = document.getElementById('val-nao-Membros');
      const vIna = document.getElementById('val-inativos');
      const vMas = document.getElementById('val-masc');
      const vFem = document.getElementById('val-fem');

      if (vMem) vMem.textContent = n_Membros;
      if (vNao) vNao.textContent = n_nao_Membros;
      if (vIna) vIna.textContent = n_inativos;
      if (vMas) vMas.textContent = masc;
      if (vFem) vFem.textContent = fem;

      // Donut Charts Helper
      const createDonut = (id, val, totalVal, color) => {
        const ctx = document.getElementById(id).getContext('2d');
        const pct = totalVal > 0 ? (val / totalVal * 100).toFixed(1) : 0;
        chartInstances[id] = new Chart(ctx, {
          type: 'doughnut',
          data: {
            datasets: [{
              data: [val, totalVal - val],
              backgroundColor: [color, 'rgba(255,255,255,0.05)'],
              borderWidth: 0,
              borderRadius: 10
            }]
          },
          options: {
            cutout: '80%',
            plugins: {
              legend: { display: false },
              tooltip: { enabled: false }
            }
          },
          plugins: [{
            beforeDraw: (chart) => {
              const { ctx, width, height } = chart;
              ctx.restore();
              ctx.font = "600 0.8rem Inter";
              ctx.textBaseline = "middle";
              ctx.fillStyle = "#1a1f2e";
              const text = pct + "%", textX = Math.round((width - ctx.measureText(text).width) / 2), textY = height / 2;
              ctx.fillText(text, textX, textY);
              ctx.save();
            }
          }]
        });
      };

      createDonut('chart-Membros', n_Membros, total, '#1b4332');
      createDonut('chart-nao-Membros', n_nao_Membros, total, '#2d6a4f');
      createDonut('chart-inativos', n_inativos, total, '#95d5b2');
      createDonut('chart-masc', masc, masc + fem, '#40916c');
      createDonut('chart-fem', fem, masc + fem, '#81c784');

      // Faixa Etária
      const faixas = { "0-10": 0, "11-20": 0, "21-30": 0, "31-40": 0, "41-50": 0, "51-60": 0, "61-70": 0, "71-80": 0, "81+": 0 };
      Membros.forEach(m => {
        if (!m.data_nascimento) return;
        const age = esteAno - new Date(m.data_nascimento).getFullYear();
        if (age <= 10) faixas["0-10"]++;
        else if (age <= 20) faixas["11-20"]++;
        else if (age <= 30) faixas["21-30"]++;
        else if (age <= 40) faixas["31-40"]++;
        else if (age <= 50) faixas["41-50"]++;
        else if (age <= 60) faixas["51-60"]++;
        else if (age <= 70) faixas["61-70"]++;
        else if (age <= 80) faixas["71-80"]++;
        else faixas["81+"]++;
      });

      chartInstances['chart-idade'] = new Chart(document.getElementById('chart-idade'), {
        type: 'bar',
        data: {
          labels: Object.keys(faixas),
          datasets: [{
            label: 'Pessoas',
            data: Object.values(faixas),
            backgroundColor: '#1b4332',
            borderRadius: 5
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { display: false }, ticks: { color: '#8a9099' } },
            y: { grid: { color: '#eef0ef' }, ticks: { color: '#8a9099' } }
          }
        }
      });

      // Crescimento (Simulado por data_admissao)
      const ultimos12Meses = Array.from({ length: 12 }, (_, i) => {
        const d = new Date(); d.setMonth(d.getMonth() - (11 - i));
        return { mes: d.getMonth() + 1, ano: d.getFullYear() };
      });
      const cresMesData = ultimos12Meses.map(slot => {
        return Membros.filter(m => {
          if (!m.data_admissao) return false;
          const [y, mm] = m.data_admissao.split('-');
          const lAno = parseInt(y);
          const lMes = parseInt(mm);
          return (lMes <= slot.mes && lAno === slot.ano) || lAno < slot.ano;
        }).length;
      });

      chartInstances['chart-cres-mes'] = new Chart(document.getElementById('chart-cres-mes'), {
        type: 'line',
        data: {
          labels: ultimos12Meses.map(s => `${s.mes}/${s.ano}`),
          datasets: [{
            label: 'Membros',
            data: cresMesData,
            borderColor: '#2e7d52',
            tension: 0.4,
            fill: true,
            backgroundColor: 'rgba(46, 125, 82, 0.08)'
          }]
        },
        options: {
          plugins: { legend: { display: false } },
          scales: {
            x: { ticks: { color: '#8a9099', font: { size: 9 } } },
            y: { ticks: { color: '#8a9099' } }
          }
        }
      });

      // Anual
      const ultimos5Anos = Array.from({ length: 5 }, (_, i) => esteAno - (4 - i));
      const cresAnoData = ultimos5Anos.map(ano => Membros.filter(m => {
        if (!m.data_admissao) return false;
        return parseInt(m.data_admissao.split('-')[0]) <= ano;
      }).length);

      chartInstances['chart-cres-ano'] = new Chart(document.getElementById('chart-cres-ano'), {
        type: 'line',
        data: {
          labels: ultimos5Anos,
          datasets: [{
            label: 'Membros',
            data: cresAnoData,
            borderColor: '#3498db',
            tension: 0.4
          }]
        },
        options: {
          plugins: { legend: { display: false } },
          scales: {
            x: { ticks: { color: '#888' } },
            y: { ticks: { color: '#888' } }
          }
        }
      });

      // FINANCEIRO DASHBOARD
      // 1. Crescimento Financeiro (12 Meses)
      const finCresData = ultimos12Meses.map(slot => {
        const filtrados = (fin || []).filter(l => {
          if (!l.data) return false;
          const [y, m] = l.data.split('-');
          return parseInt(m) === slot.mes && parseInt(y) === slot.ano;
        });
        const ent = filtrados.filter(l => l.tipo === 'entrada').reduce((s, l) => s + Number(l.valor), 0);
        const sai = filtrados.filter(l => l.tipo === 'saida').reduce((s, l) => s + Number(l.valor), 0);
        return { ent, sai };
      });

      chartInstances['chart-crescimento-financeiro'] = new Chart(document.getElementById('chart-crescimento-financeiro'), {
        type: 'line',
        data: {
          labels: ultimos12Meses.map(s => `${s.mes}/${s.ano}`),
          datasets: [
            { label: 'Entradas', data: finCresData.map(d => d.ent), borderColor: '#2e7d52', tension: 0.4, fill: false },
            { label: 'Saídas', data: finCresData.map(d => d.sai), borderColor: '#e74c3c', tension: 0.4, fill: false }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 10 } } } },
          scales: {
            x: { ticks: { font: { size: 9 } } },
            y: { ticks: { callback: v => 'R$ ' + v.toLocaleString('pt-BR') } }
          }
        }
      });

      // 2. Entradas vs Saídas (Mês Atual) - Doughnut
      chartInstances['chart-entradas-saidas-mes'] = new Chart(document.getElementById('chart-entradas-saidas-mes'), {
        type: 'doughnut',
        data: {
          labels: ['Entradas', 'Saídas'],
          datasets: [{
            data: [totalEntradas, totalSaidas],
            backgroundColor: ['#2e7d52', '#e74c3c'],
            borderWidth: 0
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { position: 'bottom' } }
        }
      });

      // 3. Comparativo Anual (Barras)
      const mesesAno = Array.from({ length: 12 }, (_, i) => i + 1);
      const finAnualData = mesesAno.map(m => {
        const filtrados = (fin || []).filter(l => {
          if (!l.data) return false;
          const [y, mm] = l.data.split('-');
          return parseInt(mm) === m && parseInt(y) === esteAno;
        });
        const ent = filtrados.filter(l => l.tipo === 'entrada').reduce((s, l) => s + Number(l.valor), 0);
        const sai = filtrados.filter(l => l.tipo === 'saida').reduce((s, l) => s + Number(l.valor), 0);
        return { ent, sai };
      });

      chartInstances['chart-comparativo-anual'] = new Chart(document.getElementById('chart-comparativo-anual'), {
        type: 'bar',
        data: {
          labels: ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'],
          datasets: [
            { label: 'Entradas', data: finAnualData.map(d => d.ent), backgroundColor: '#2e7d52' },
            { label: 'Saídas', data: finAnualData.map(d => d.sai), backgroundColor: '#e74c3c' }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            y: { beginAtZero: true, ticks: { callback: v => 'R$ ' + v.toLocaleString('pt-BR') } }
          }
        }
      });

      // 4. Total Anual (Bar)
      const totalEntradasAno = finAnualData.reduce((acc, d) => acc + d.ent, 0);
      const totalSaidasAno = finAnualData.reduce((acc, d) => acc + d.sai, 0);
      chartInstances['chart-total-ano'] = new Chart(document.getElementById('chart-total-ano'), {
        type: 'bar',
        data: {
          labels: ['Entradas', 'Saídas'],
          datasets: [{
            label: 'Total',
            data: [totalEntradasAno, totalSaidasAno],
            backgroundColor: ['#2e7d52', '#e74c3c'],
            borderRadius: 4
          }]
        },
        options: {
          indexAxis: 'y',
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: { label: (ctx) => ' R$ ' + ctx.raw.toLocaleString('pt-BR') }
            }
          },
          scales: {
            x: { beginAtZero: true, ticks: { callback: v => 'R$ ' + v.toLocaleString('pt-BR') } }
          }
        }
      });
    }

    const container = document.getElementById('main-content') || document.querySelector('.main-content');

    if (container) {
        console.log('✅ Container encontrado, renderizando...');

        const nav = document.getElementById('menu-navegacao');
        if (nav) {
            nav.innerHTML = modulos.map(m => {
                if (!temPermissao(m.id)) return '';
                return `<button class="nav-btn" data-id="${m.id}" onclick="mostrar('${m.id}')">
                            <i data-lucide="${m.icone}"></i> ${m.label}
                        </button>`;

    async function relatoriosExportarExcel(idContainer, nomeArquivo) {
      const container = document.getElementById(idContainer);
      if (!container) { alert('Container não encontrado.'); return; }

      // Abordagem robusta: percorrer todos os nós filhos em ordem
      const aoa = [];
      const merges = [];
      const boldRows = [];

      function processElement(parent) {
        for (const el of parent.children) {
          // Barra de seção → título
          if (el.classList && el.classList.contains('section-bar')) {
            aoa.push([]); // linha vazia
            const idx = aoa.length;
            aoa.push([el.textContent.trim(), '', '', '']);
            merges.push({ s: { r: idx, c: 0 }, e: { r: idx, c: 3 } });
            boldRows.push(idx);
            continue;
          }

          // Tabela → extrair TODAS as linhas (tr)
          if (el.tagName === 'TABLE') {
            const allRows = el.querySelectorAll('tr');
            allRows.forEach(tr => {
              const cells = [];
              const isHeader = tr.querySelector('th') !== null;
              const isFoot = tr.closest('tfoot') !== null;

              tr.querySelectorAll('th, td').forEach(cell => {
                const colspan = parseInt(cell.getAttribute('colspan')) || 1;
                cells.push(cell.textContent.trim());
                for (let c = 1; c < colspan; c++) cells.push('');
              });

              const idx = aoa.length;
              aoa.push(cells);
              if (isHeader || isFoot || tr.style.fontWeight === 'bold' || tr.getAttribute('style')?.includes('font-weight')) {
                boldRows.push(idx);
              }
            });
            continue;
          }

          // Div container → processar recursivamente
          if (el.children && el.children.length > 0 && el.tagName === 'DIV') {
            processElement(el);
          }
        }
      }

      processElement(container);

      if (aoa.length === 0) { alert('Sem dados para exportar.'); return; }

      const ws = XLSX.utils.aoa_to_sheet(aoa);
      ws['!merges'] = merges;

      // Larguras de coluna
      const maxCols = Math.max(...aoa.map(r => r.length), 4);
      ws['!cols'] = [
        { wch: 14 },  // DATA
        { wch: 42 },  // PESSOA/FORNECEDOR
        { wch: 20 },  // CATEGORIA
        { wch: 16 }   // VALOR
      ];

      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Relatório');
      XLSX.writeFile(wb, `${nomeArquivo}_${new Date().getTime()}.xlsx`);
    }

    // Função específica para gerar relatório EBD
    async function relatoriosGerarEBD() {
      const res = document.getElementById('relatorio-resultado');
      res.innerHTML = '<div class="vazio-central">Processando dados...</div>';

      const turmaId = document.getElementById('rep-ebd-turma')?.value;
      const dataIni = document.getElementById('rep-ebd-data-ini')?.value;
      const dataFim = document.getElementById('rep-ebd-data-fim')?.value;
      const tipo = document.getElementById('rep-ebd-tipo')?.value;

      // Consultar alunos
      let queryAlunos = supabase.from('ebd_alunos').select('*, turma_id, turmas_ebd!inner(nome)');
      if (turmaId) queryAlunos = queryAlunos.eq('turma_id', turmaId);
      const { data: alunos, error: errAl } = await queryAlunos;
      if (errAl) { res.innerHTML = `<div class="erro">Erro: ${errAl.message}</div>`; return; }

      if (!alunos || alunos.length === 0) {
        res.innerHTML = '<div class="vazio-central">Nenhum aluno encontrado para o filtro selecionado.</div>';
        return;
      }

      const { data: branding } = await supabase.from('configuracoes').select('*').single();
      const dataEmissao = new Date().toLocaleString('pt-BR');
      let html = '';

      if (tipo === 'lista') {
        // Lista simples de alunos
        html = `
          <div id="relatorio-tabela-container">
            <div class="section-bar geral">RELAÇÃO DE ALUNOS MATRICULADOS</div>
            <table class="tabela">
              <thead><tr><th>Turma</th><th>Nome do Aluno</th></tr></thead>
              <tbody>
                ${alunos.map(a => `<tr><td>${a.turmas_ebd?.nome || 'Turma não definida'}</td><td>${a.nome}</td></tr>`).join('')}
              </tbody>
            </table>
          </div>
        `;
      } 
      else if (tipo === 'frequencia') {
        // Frequência por período
        const idsAlunos = alunos.map(a => a.id);
        let queryCham = supabase.from('ebd_chamadas').select('*, aluno_id, data, presente').in('aluno_id', idsAlunos);
        if (dataIni) queryCham = queryCham.gte('data', dataIni);
        if (dataFim) queryCham = queryCham.lte('data', dataFim);
        const { data: chamadas } = await queryCham;

        const mapaPresencas = {};
        alunos.forEach(a => { mapaPresencas[a.id] = { nome: a.nome, turma: a.turmas_ebd?.nome || '?', total: 0, presentes: 0 }; });
        (chamadas || []).forEach(c => {
          if (mapaPresencas[c.aluno_id]) {
            mapaPresencas[c.aluno_id].total++;
            if (c.presente) mapaPresencas[c.aluno_id].presentes++;
          }
        });

        html = `
          <div id="relatorio-tabela-container">
            <div class="section-bar geral">FREQUÊNCIA NO PERÍODO (${dataIni || 'início'} até ${dataFim || 'hoje'})</div>
            <table class="tabela">
              <thead><tr><th>Turma</th><th>Aluno</th><th>Presenças</th><th>Total Aulas</th><th>% Frequência</th></tr></thead>
              <tbody>
                ${Object.values(mapaPresencas).map(a => {
                  const perc = a.total > 0 ? ((a.presentes / a.total) * 100).toFixed(1) : '0';
                  return `<tr><td>${a.turma}</td><td>${a.nome}</td><td>${a.presentes}</td><td>${a.total}</td><td>${perc}%</td></tr>`;
                }).join('')}
              </tbody>
            </table>
          </div>
        `;
      }
      else if (tipo === 'resumo') {
        // Resumo por turma: total de presenças e alunos
        const agrupado = {};
        for (const a of alunos) {
          const turmaNome = a.turmas_ebd?.nome || 'Sem turma';
          if (!agrupado[turmaNome]) agrupado[turmaNome] = { totalAlunos: 0, totalPresencas: 0, totalAulas: 0 };
          agrupado[turmaNome].totalAlunos++;
          // Buscar chamadas do aluno
          let queryCham = supabase.from('ebd_chamadas').select('presente').eq('aluno_id', a.id);
          if (dataIni) queryCham = queryCham.gte('data', dataIni);
          if (dataFim) queryCham = queryCham.lte('data', dataFim);
          const { data: chams } = await queryCham;
          if (chams) {
            agrupado[turmaNome].totalAulas += chams.length;
            agrupado[turmaNome].totalPresencas += chams.filter(c => c.presente).length;
          }
        }
        html = `
          <div id="relatorio-tabela-container">
            <div class="section-bar geral">RESUMO POR TURMA (${dataIni || 'início'} até ${dataFim || 'hoje'})</div>
            <table class="tabela">
              <thead><tr><th>Turma</th><th>Total de Alunos</th><th>Total de Presenças</th><th>Total de Aulas</th><th>Média de Presença</th></tr></thead>
              <tbody>
                ${Object.entries(agrupado).map(([nome, vals]) => {
                  const media = vals.totalAulas > 0 ? (vals.totalPresencas / vals.totalAulas).toFixed(1) : '0';
                  return `<tr><td>${nome}</td><td>${vals.totalAlunos}</td><td>${vals.totalPresencas}</td><td>${vals.totalAulas}</td><td>${media} por aula</td></tr>`;
                }).join('')}
              </tbody>
            </table>
          </div>
        `;
      }

      res.innerHTML = `
        <div class="no-print" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; background:#f8fafc; padding:10px; border-radius:8px">

            <h1>${branding?.nome_igreja || 'Igreja Presbiteriana'}</h1>
            <span style="font-size:9pt; font-weight:bold">RELATÓRIO EBD</span>
        </div>
        
        ${html}
        
        <div class="print-footer">
            Relatório gerado em ${dataEmissao} - Sistema de Gestão Eclesiástica
        </div>
    `;
    }

        const MembrosÚnicos = Array.from(new Map(Membros.map(m => [m.id, m])).values());

    // RELATÓRIO DE MEMBROS
    async function relatoriosGerarMembros(Membros, res) {
  let filtered = [...Membros];
  let subTitulo = '';

  const hoje = new Date();
  const esteAno = hoje.getFullYear();
  const parseDM = str => {
    if (!str) return null;
    const parts = str.split('/');
    if (parts.length < 2) return null;
    return { d: parseInt(parts[0]), m: parseInt(parts[1]) };
  };
  const idadeDe = d => d ? esteAno - new Date(d + 'T12:00:00').getFullYear() : -1;

  // Helper: verifica se dia/mes está dentro de um intervalo (suporta virada de ano)
  const dentroDoIntervalo = (d, mes, ini, fim) => {
    const val = mes * 100 + d;
    const iniVal = ini.m * 100 + ini.d;
    const fimVal = fim.m * 100 + fim.d;
    if (iniVal <= fimVal) return val >= iniVal && val <= fimVal;
    return val >= iniVal || val <= fimVal; // virada de ano (ex: dez→jan)
  };

  switch (_repSubTipo) {

    case 'aniversariantes': {
      const iniStr = document.getElementById('r-dia-ini')?.value;
      const fimStr = document.getElementById('r-dia-fim')?.value;
      const ini = parseDM(iniStr);
      const fim = parseDM(fimStr);
      if (ini && fim) {
        filtered = filtered.filter(m => {
          if (!m.data_nascimento) return false;
          const dn = new Date(m.data_nascimento + 'T12:00:00');
          return dentroDoIntervalo(dn.getDate(), dn.getMonth() + 1, ini, fim);
        });
      }
      filtered.sort((a, b) => {
        const da = new Date(a.data_nascimento + 'T12:00:00');
        const db = new Date(b.data_nascimento + 'T12:00:00');
        if (da.getMonth() !== db.getMonth()) return da.getMonth() - db.getMonth();
        return da.getDate() - db.getDate();
      });
      subTitulo = `ANIVERSARIANTES${iniStr && fimStr ? ` (${iniStr} a ${fimStr})` : ''}`;
      break;
    }

    case 'aniversariantes_casamento': {
      const iniStr = document.getElementById('r-dia-ini')?.value;
      const fimStr = document.getElementById('r-dia-fim')?.value;
      const ini = parseDM(iniStr);
      const fim = parseDM(fimStr);
      filtered = filtered.filter(m => m.data_casamento);
      if (ini && fim) {
        filtered = filtered.filter(m => {
          const dc = new Date(m.data_casamento + 'T12:00:00');
          return dentroDoIntervalo(dc.getDate(), dc.getMonth() + 1, ini, fim);
        });
      }
      filtered.sort((a, b) => {
        const da = new Date(a.data_casamento + 'T12:00:00');
        const db = new Date(b.data_casamento + 'T12:00:00');
        if (da.getMonth() !== db.getMonth()) return da.getMonth() - db.getMonth();
        return da.getDate() - db.getDate();
      });
      subTitulo = `ANIVERSARIANTES DE CASAMENTO${iniStr && fimStr ? ` (${iniStr} a ${fimStr})` : ''}`;
      break;
    }

    case 'faixa_etaria': {
      const idadeMin = parseInt(document.getElementById('r-idade-ini')?.value) || 0;
      const idadeMax = parseInt(document.getElementById('r-idade-fim')?.value) || 150;
      filtered = filtered.filter(m => {
        const idade = idadeDe(m.data_nascimento);
        return idade >= 0 && idade >= idadeMin && idade <= idadeMax;
      });
      subTitulo = `MEMBROS POR FAIXA ETÁRIA (${idadeMin} a ${idadeMax} anos)`;
      break;
    }

    case 'modo_admissao': {
      const modo = document.getElementById('r-modo')?.value;
      if (modo) filtered = filtered.filter(m => m.modo_admissao === modo);
      subTitulo = `MODO DE ADMISSÃO${modo ? ': ' + modo.toUpperCase() : ' (TODOS)'}`;
      break;
    }

    case 'lideranca': {
      const lid = document.getElementById('r-lideranca')?.value;
      if (lid) filtered = filtered.filter(m => m.lideranca === lid);
      subTitulo = `POR LIDERANÇA${lid ? ': ' + lid.toUpperCase() : ' (TODAS)'}`;
      break;
    }

    case 'categoria': {
      const cat = document.getElementById('r-categoria')?.value;
      if (cat) filtered = filtered.filter(m => m.categoria === cat);
      subTitulo = `POR CATEGORIA${cat ? ': ' + cat.toUpperCase() : ' (TODAS)'}`;
      break;
    }

    case 'sexo': {
      const sexo = document.getElementById('r-sexo')?.value;
      if (sexo) filtered = filtered.filter(m => m.sexo === sexo);
      subTitulo = `POR SEXO${sexo ? ': ' + (sexo === 'M' ? 'MASCULINO' : 'FEMININO') : ' (TODOS)'}`;
      break;
    }

    case 'estado_civil': {
      const civil = document.getElementById('r-civil')?.value;
      if (civil) filtered = filtered.filter(m => m.estado_civil === civil);
      subTitulo = `ESTADO CIVIL${civil ? ': ' + civil.toUpperCase() : ' (TODOS)'}`;
      break;
    }

    case 'todos': {
      subTitulo = 'LISTA GERAL DE MEMBROS';
      break;
    }

    case 'combinado': {
      subTitulo = 'LISTA COMBINADA DE MEMBROS';
      break;
    }

    case 'casais': {
  const casados = Membros.filter(m => m.estado_civil === 'Casado(a)');
  const casaisMap = new Map();

  for (const m of casados) {
    let conjuge = null;
    if (m.conjuge_id) conjuge = Membros.find(c => c.id === m.conjuge_id);
    if (!conjuge && m.nome_conjuge) conjuge = Membros.find(c => c.nome === m.nome_conjuge);

    if (conjuge && conjuge.estado_civil === 'Casado(a)') {
      // Gera chave estável com UUIDs ordenados lexicograficamente
      const ids = [m.id, conjuge.id].sort();
      const key = `${ids[0]}-${ids[1]}`;
      if (!casaisMap.has(key)) {
        casaisMap.set(key, { m1: m, m2: conjuge });
      }
    } else {
      // Casais onde o cônjuge não está cadastrado no sistema
      const key = `single-${m.id}`;
      if (!casaisMap.has(key)) {
        casaisMap.set(key, { m1: m, m2: null });
      }
    }
  }

  // Converte o Map para array
  let listaCasais = Array.from(casaisMap.values()).map(pair => {
    let homem, mulher;
    if (pair.m1.sexo === 'M' && pair.m2?.sexo === 'F') {
      homem = pair.m1; mulher = pair.m2;
    } else if (pair.m1.sexo === 'F' && pair.m2?.sexo === 'M') {
      homem = pair.m2; mulher = pair.m1;
    } else if (pair.m1.sexo === 'M') {
      homem = pair.m1; mulher = pair.m2;
    } else if (pair.m1.sexo === 'F') {
      homem = pair.m2; mulher = pair.m1;
    } else {
      homem = pair.m1; mulher = pair.m2;
    }
    if (!homem) return null;
    return {
      homem_nome: homem.nome,
      homem_data_nascimento: homem.data_nascimento,
      homem_ministerio: homem.ministerio,
      mulher_nome: mulher ? mulher.nome : 'Cônjuge não cadastrado',
      data_casamento: homem.data_casamento || mulher?.data_casamento || null,
      categoria: homem.categoria || mulher?.categoria || ''
    };
  }).filter(c => c !== null);

  // Aplica filtros de idade, ministério e tempo de casamento (já existentes)
  const idadeMinH = document.getElementById('r-idade-min-homem')?.value;
  if (idadeMinH && !isNaN(parseInt(idadeMinH))) {
    const min = parseInt(idadeMinH);
    listaCasais = listaCasais.filter(c => c.homem_data_nascimento && idadeDe(c.homem_data_nascimento) >= min);
  }
  const idadeMaxH = document.getElementById('r-idade-max-homem')?.value;
  if (idadeMaxH && !isNaN(parseInt(idadeMaxH))) {
    const max = parseInt(idadeMaxH);
    listaCasais = listaCasais.filter(c => c.homem_data_nascimento && idadeDe(c.homem_data_nascimento) <= max);
  }
  const minH = document.getElementById('r-ministerio-homem')?.value;
  if (minH) listaCasais = listaCasais.filter(c => c.homem_ministerio === minH);
  const tempMin = document.getElementById('r-tempo-min-casamento')?.value;
  if (tempMin && !isNaN(parseInt(tempMin))) {
    const minAnos = parseInt(tempMin);
    listaCasais = listaCasais.filter(c => {
      if (!c.data_casamento) return false;
      const dc = new Date(c.data_casamento + 'T12:00:00');
      if (isNaN(dc.getTime())) return false;
      let anos = hoje.getFullYear() - dc.getFullYear();
      if (hoje.getMonth() < dc.getMonth()) anos--;
      else if (hoje.getMonth() === dc.getMonth() && hoje.getDate() < dc.getDate()) anos--;
      return anos >= minAnos;
    });
  }

  filtered = listaCasais;
  subTitulo = 'LISTA DE CASAIS (MARIDO + ESPOSA)';
  break;
}

    default:
      subTitulo = 'LISTA DE MEMBROS';
  }

  if (filtered.length === 0) {
    res.innerHTML = '<div class="vazio-central">Nenhum membro encontrado com os filtros selecionados.</div>';
    return;
  }

  // Montagem das linhas da tabela
  const rows = filtered.map(m => {
    let dataNasc = '', idade = '', dataCasamento = '', tempoCasamento = '';

    if (_repSubTipo === 'casais') {
      if (m.data_casamento) {
        const dc = new Date(m.data_casamento + 'T12:00:00');
        dataCasamento = dc.toLocaleDateString('pt-BR');
        let anos = hoje.getFullYear() - dc.getFullYear();
        let meses = hoje.getMonth() - dc.getMonth();
        if (meses < 0) { meses += 12; anos--; }
        tempoCasamento = `${anos} ano${anos !== 1 ? 's' : ''} e ${meses} mes${meses !== 1 ? 'es' : ''}`;
      }
      return `<tr>
        <td>${m.homem_nome}</td>
        <td>${dataCasamento}</td>
        <td>${tempoCasamento}</td>
        <td>${m.categoria || ''}</td>
        <td>${m.mulher_nome}</td>
      </tr>`;
    }

    if (m.data_nascimento) {
      const dn = new Date(m.data_nascimento + 'T12:00:00');
      dataNasc = dn.toLocaleDateString('pt-BR').slice(0, 5);
      idade = idadeDe(m.data_nascimento);
    }

    if (_repSubTipo === 'aniversariantes_casamento') {
      if (m.data_casamento) {
        const dc = new Date(m.data_casamento + 'T12:00:00');
        dataCasamento = dc.toLocaleDateString('pt-BR').slice(0, 5);
        let anos = hoje.getFullYear() - dc.getFullYear();
        if (hoje.getMonth() < dc.getMonth() || (hoje.getMonth() === dc.getMonth() && hoje.getDate() < dc.getDate())) anos--;
        tempoCasamento = `${anos} ano${anos !== 1 ? 's' : ''}`;
      }
      return `<tr>
        <td>${m.nome}</td>
        <td>${dataCasamento}</td>
        <td>${tempoCasamento}</td>
        <td>${m.categoria || ''}</td>
      </tr>`;
    }

    // Caso geral: aniversariantes, faixa_etaria, modo_admissao, lideranca, categoria, sexo, estado_civil, todos, combinado
    return `<tr>
      <td>${m.nome}</td>
      <td>${dataNasc}</td>
      <td>${idade >= 0 ? idade : ''}</td>
      <td>${m.categoria || ''}</td>
    </tr>`;
  }).filter(Boolean).join('');

  // Cabeçalho da tabela
  let headers = '<th>NOME COMPLETO</th>';
  if (_repSubTipo === 'aniversariantes_casamento') {
    headers += '<th>DATA DO CASAMENTO</th><th>TEMPO CASADOS</th><th>CATEGORIA</th>';
  } else if (_repSubTipo === 'casais') {
    headers += '<th>DATA DO CASAMENTO</th><th>TEMPO DE CASAMENTO</th><th>CATEGORIA</th><th>CÔNJUGE</th>';
  } else {
    headers += '<th>NASC.</th><th>IDADE</th><th>CATEGORIA</th>';
  }

  const tableHtml = `
    <div id="relatorio-tabela-container">
      <table class="tabela">
        <thead><tr>${headers}</tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;

  const { data: branding } = await supabase.from('configuracoes').select('*').single();
  const dataEmissao = new Date().toLocaleString('pt-BR');

  res.innerHTML = `
    <div class="no-print" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; background:#f8fafc; padding:10px; border-radius:8px">
      <span style="font-size:0.85rem; color:#64748b"><strong>${filtered.length}</strong> registro${filtered.length !== 1 ? 's' : ''} encontrado${filtered.length !== 1 ? 's' : ''}</span>
      <div style="display:flex; gap:10px">
        <button class="btn-secondary" onclick="window._rep.exportarXLSX('relatorio-tabela-container', 'Relatorio_Membros')">📊 Exportar Excel</button>
        <button class="btn-primary" onclick="window.print()">🖨️ Imprimir</button>
      </div>
    </div>
    <div class="print-header-bar">
      <h1>${branding?.nome_igreja || 'Igreja Presbiteriana'}</h1>
      <span style="font-size:9pt; font-weight:bold">${subTitulo}</span>
    </div>
    ${tableHtml}
    <div class="print-footer">Relatório gerado em ${dataEmissao} - Sistema de Gestão Eclesiástica</div>
  `;
}

// RELATÓRIO FINANCEIRO - VERSÃO COMPLETA (COM TODOS OS TIPOS)
async function relatoriosGerarFinanceiro(res) {
  const fmt = v => Number(v || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
  const fd = d => { if (!d) return ''; const [y, m, dia] = d.split('-'); return `${dia}/${m}/${y}`; };
  const { data: branding } = await supabase.from('configuracoes').select('*').single();

  // ========== 1. EXTRATO INDIVIDUAL ==========
  if (_repSubTipo === 'extrato_individual') {
    const nomePessoa = document.getElementById('rf-pessoa')?.value.trim();
    if (!nomePessoa) { res.innerHTML = '<div class="erro">Digite o nome da pessoa.</div>'; return; }
    const dataIni = document.getElementById('rf-ini').value;
    const dataFim = document.getElementById('rf-fim').value;
    let pessoaId = null, isMembro = false;
    const { data: membros } = await supabase.from('membros').select('id, nome');
    const { data: visitantes } = await supabase.from('visitantes').select('id, nome');
    const membro = membros?.find(m => m.nome.toLowerCase() === nomePessoa.toLowerCase());
    if (membro) { pessoaId = membro.id; isMembro = true; }
    else {
      const visitante = visitantes?.find(v => v.nome.toLowerCase() === nomePessoa.toLowerCase());
      if (visitante) pessoaId = visitante.id;
    }
    if (!pessoaId) { res.innerHTML = `<div class="erro">Pessoa "${nomePessoa}" não encontrada.</div>`; return; }
    let query = supabase.from('lancamentos').select('*').eq('tipo', 'entrada').gte('data', dataIni).lte('data', dataFim);
    if (isMembro) query = query.eq('membro_id', pessoaId);
    else query = query.eq('visitante_id', pessoaId);
    const { data: lancamentos, error } = await query.order('data', { ascending: true });
    if (error) throw error;
    let total = 0;
    const rows = (lancamentos || []).map(l => { total += Number(l.valor); return `<tr><td>${fd(l.data)}</td><td>${l.categoria || 'Contribuição'}</td><td class="valor-cel">${fmt(l.valor)}</td></tr>`; }).join('');
    const dataEmissao = new Date().toLocaleString('pt-BR');
    res.innerHTML = `
      <div class="no-print" style="display:flex; gap:10px; margin-bottom:15px">
        <button class="btn-secondary" onclick="window._rep.exportarXLSX('relatorio-tabela-container', 'Extrato_${nomePessoa}')">📊 Excel</button>
        <button class="btn-primary" onclick="window.print()">🖨️ Imprimir</button>
      </div>
      <div class="print-header-bar"><h1>${branding?.nome_igreja || 'Igreja'}</h1><span>EXTRATO - ${nomePessoa.toUpperCase()}</span></div>
      <div id="relatorio-tabela-container">
        <table class="tabela">
          <thead><tr><th>DATA</th><th>CATEGORIA</th><th class="valor-cel">VALOR</th></tr></thead>
          <tbody>${rows || '<tr><td colspan="3">Nenhuma contribuição no período.</td></tr>'}</tbody>
          <tfoot><tr><td colspan="2">TOTAL</td><td class="valor-cel">${fmt(total)}</td></tr></tfoot>
        </table>
      </div>
      <div class="print-footer">Gerado em ${dataEmissao}</div>
    `;
    return;
  }

  // ========== 2. BALANCETE (com analítico detalhado e colunas separadas) ==========
  if (_repSubTipo === 'balancete') {
    const ini = document.getElementById('rf-ini').value;
    const fim = document.getElementById('rf-fim').value;
    const tipo = document.getElementById('rf-tipo')?.value || 'sintetico';
    const ent = document.getElementById('rf-nat-ent')?.checked !== false;
    const sai = document.getElementById('rf-nat-sai')?.checked !== false;

    // Saldo anterior
    const { data: anterior } = await supabase.from('lancamentos').select('valor, tipo').lt('data', ini);
    let saldoAnterior = 0;
    (anterior || []).forEach(l => {
      if (l.tipo === 'entrada') saldoAnterior += Number(l.valor);
      else saldoAnterior -= Number(l.valor);
    });

    // Buscar lançamentos do período
    let query = supabase.from('lancamentos').select('*, membros(nome), visitantes(nome)').gte('data', ini).lte('data', fim).order('data');
    const { data: lancamentos, error } = await query;
    if (error) { res.innerHTML = 'Erro: ' + error.message; return; }

    let filtrados = lancamentos.filter(l => (ent && l.tipo === 'entrada') || (sai && l.tipo === 'saida'));
    let html = '';

    if (tipo === 'sintetico') {
      // Agrupa por categoria
      const cats = {};
      filtrados.forEach(l => {
        const c = l.categoria || 'Outros';
        if (!cats[c]) cats[c] = { entrada: 0, saida: 0 };
        cats[c][l.tipo] += Number(l.valor);
      });
      let totE = 0, totS = 0;
      const rows = Object.entries(cats).map(([c, v]) => {
        totE += v.entrada; totS += v.saida;
        return `<tr><td>${c}</td><td class="valor-cel">${fmt(v.entrada)}</td><td class="valor-cel">${fmt(v.saida)}</td><td class="valor-cel">${fmt(v.entrada - v.saida)}</td></tr>`;
      }).join('');
      const saldoPeriodo = totE - totS;
      const saldoFinal = saldoAnterior + saldoPeriodo;
      html = `<div id="relatorio-tabela-container"><div class="section-bar geral">RESUMO SINTÉTICO</div>
        <table class="tabela">
          <thead><tr><th>CATEGORIA</th><th>ENTRADAS</th><th>SAÍDAS</th><th>SALDO</th></tr></thead>
          <tbody>${rows}</tbody>
          <tfoot>
            <tr><td>SALDO ANTERIOR</td><td colspan="2"></td><td class="valor-cel">${fmt(saldoAnterior)}</td></tr>
            <tr><td>TOTAIS DO PERÍODO</td><td class="valor-cel">${fmt(totE)}</td><td class="valor-cel">${fmt(totS)}</td><td class="valor-cel">${fmt(saldoPeriodo)}</td></tr>
            <tr><td>SALDO FINAL</td><td colspan="2"></td><td class="valor-cel">${fmt(saldoFinal)}</td></tr>
          </tfoot>
        </table>
      </div>`;
    } else {
      // ANALÍTICO: exibe todos os lançamentos com colunas separadas
      const entradas = filtrados.filter(l => l.tipo === 'entrada');
      const saidas = filtrados.filter(l => l.tipo === 'saida');

      // Função montarTabela corrigida com colunas: DATA, PESSOA, CATEGORIA, DESCRIÇÃO, CONTA, VALOR
      const montarTabela = (lista, titulo, cor) => {
        if (lista.length === 0) return '';
        let sub = 0;
        const rows = lista.map(l => {
          sub += Number(l.valor);
          const nomePessoa = l.membros?.nome || l.visitantes?.nome || (titulo === 'entradas' ? 'Contribuinte' : 'Fornecedor');
          const categoria = l.categoria || (titulo === 'entradas' ? 'Contribuição' : '');
          const descricao = l.descricao || '';   // ← campo descrição (forma de pagamento para entradas)
          const conta = l.conta || 'Caixa';
          return `
            <tr>
              <td style="padding:6px">${fd(l.data)}</td>
              <td>${nomePessoa}</td>
              <td>${categoria}</td>
              <td>${descricao}</td>
              <td>${conta}</td>
              <td class="valor-cel">${fmt(l.valor)}</td>
            </tr>
          `;
        }).join('');
        return `
          <div class="section-bar" style="background:${cor}; color:white; padding:8px; margin-top:20px;">${titulo.toUpperCase()}</div>
          <table class="tabela">
            <thead>
              <tr>
                <th>DATA</th>
                <th>${titulo === 'entradas' ? 'CONTRIBUINTE' : 'FORNECEDOR'}</th>
                <th>CATEGORIA</th>
                <th>DESCRIÇÃO</th>
                <th>CONTA</th>
                <th class="valor-cel">VALOR</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
            <tfoot>
              <tr style="font-weight:bold; background:#f1f5f9">
                <td colspan="5">SUBTOTAL ${titulo.toUpperCase()}</td>
                <td class="valor-cel">${fmt(sub)}</td>
              </tr>
            </tfoot>
          </table>
        `;
      };

      const totE = entradas.reduce((s, l) => s + Number(l.valor), 0);
      const totS = saidas.reduce((s, l) => s + Number(l.valor), 0);
      const saldoPeriodo = totE - totS;
      const saldoFinal = saldoAnterior + saldoPeriodo;

      html = `<div id="relatorio-tabela-container">
        ${montarTabela(entradas, 'entradas', '#2e7d52')}
        ${montarTabela(saidas, 'saídas', '#c0392b')}
        <div class="section-bar geral">BALANÇO GERAL</div>
        <table class="tabela">
          <tr><td>SALDO ANTERIOR</td><td colspan="4"></td><td class="valor-cel">${fmt(saldoAnterior)}</td></tr>
          <tr><td>TOTAL DE ENTRADAS</td><td colspan="4"></td><td class="valor-cel">${fmt(totE)}</td></tr>
          <tr><td>TOTAL DE SAÍDAS</td><td colspan="4"></td><td class="valor-cel">${fmt(totS)}</td></tr>
          <tr><td>SALDO DO PERÍODO</td><td colspan="4"></td><td class="valor-cel">${fmt(saldoPeriodo)}</td></tr>
          <tr><td>SALDO FINAL (ACUMULADO)</td><td colspan="4"></td><td class="valor-cel">${fmt(saldoFinal)}</td></tr>
        </table>
      </div>`;
    }

    const dataEmissao = new Date().toLocaleString('pt-BR');
    res.innerHTML = `
      <div class="no-print" style="display:flex; gap:10px; margin-bottom:15px">
        <button class="btn-secondary" onclick="window._rep.exportarXLSX('relatorio-tabela-container', 'Balancete')">📊 Exportar Excel</button>
        <button class="btn-primary" onclick="window.print()">🖨️ Imprimir</button>
      </div>
      <div class="print-header-bar">
        <h1>${branding?.nome_igreja || 'Igreja Presbiteriana'}</h1>
        <span style="font-size:9pt; font-weight:bold">BALANCETE ${tipo === 'analitico' ? 'ANALÍTICO' : 'SINTÉTICO'} (${fd(ini)} a ${fd(fim)})</span>
      </div>
      ${html}
      <div class="print-footer">Relatório gerado em ${dataEmissao}</div>
    `;
    return;
  }

  // ========== 3. CONTRIBUIÇÃO MENSAL (MATRIZ) ==========
  if (_repSubTipo === 'contribuicao_mensal') {
    const ano = document.getElementById('rf-ano').value;
    if (!ano) { res.innerHTML = '<div class="erro">Selecione um ano.</div>'; return; }
    const { data: lancamentos } = await supabase
      .from('lancamentos')
      .select('data, valor, membro_id, membros(nome), visitante_id, visitantes(nome)')
      .eq('tipo', 'entrada')
      .gte('data', `${ano}-01-01`)
      .lte('data', `${ano}-12-31`);
    if (!lancamentos) { res.innerHTML = '<div class="erro">Erro ao buscar dados.</div>'; return; }
    const pessoas = new Map();
    lancamentos.forEach(l => {
      let id, nome;
      if (l.membro_id && l.membros) { id = `m_${l.membro_id}`; nome = l.membros.nome; }
      else if (l.visitante_id && l.visitantes) { id = `v_${l.visitante_id}`; nome = l.visitantes.nome; }
      else return;
      if (!pessoas.has(id)) pessoas.set(id, { nome, meses: new Array(12).fill(0) });
      const mes = new Date(l.data).getMonth();
      pessoas.get(id).meses[mes] += Number(l.valor);
    });
    const ordenadas = Array.from(pessoas.values()).sort((a,b) => a.nome.localeCompare(b.nome));
    const mesesLabels = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
    const totaisMes = new Array(12).fill(0);
    let totalGeral = 0;
    ordenadas.forEach(p => { p.meses.forEach((v, i) => { totaisMes[i] += v; totalGeral += v; }); });
    let html = `<div id="relatorio-tabela-container"><table class="tabela"><thead><tr><th>NOME</th>${mesesLabels.map(m => `<th>${m}</th>`).join('')}<th>TOTAL</th></tr></thead><tbody>`;
    ordenadas.forEach(p => {
      const totalPessoa = p.meses.reduce((s,v) => s+v, 0);
      html += `<tr><td>${p.nome}</td>${p.meses.map(v => `<td class="valor-cel">${fmt(v)}</td>`).join('')}<td class="valor-cel">${fmt(totalPessoa)}</td></tr>`;
    });
    html += `<tr style="background:#e2e8f0; font-weight:bold"><td>TOTAIS</td>${totaisMes.map(v => `<td class="valor-cel">${fmt(v)}</td>`).join('')}<td class="valor-cel">${fmt(totalGeral)}</td></tr>`;
    html += `</tbody></table></div>`;
    const dataEmissao = new Date().toLocaleString('pt-BR');
    res.innerHTML = `
      <div class="no-print" style="display:flex; gap:10px; margin-bottom:15px">
        <button class="btn-secondary" onclick="window._rep.exportarXLSX('relatorio-tabela-container', 'Contribuicao_Mensal_${ano}')">📊 Excel</button>
        <button class="btn-primary" onclick="window.print()">🖨️ Imprimir</button>
      </div>
      <div class="print-header-bar"><h1>${branding?.nome_igreja || 'Igreja'}</h1><span>CONTRIBUIÇÃO MENSAL - ${ano}</span></div>
      ${html}
      <div class="print-footer">Gerado em ${dataEmissao}</div>
    `;
    return;
  }

  // ========== 4. CONTRIBUIÇÃO POR LIDERANÇA (MATRIZ) ==========
  if (_repSubTipo === 'contribuicao_lideranca') {
    const dataIni = document.getElementById('rf-ini').value;
    const dataFim = document.getElementById('rf-fim').value;
    const grupo = document.getElementById('rf-grupo')?.value;
    if (!grupo) { res.innerHTML = '<div class="vazio-central">Selecione uma liderança.</div>'; return; }
    const { data: membros } = await supabase.from('membros').select('id, nome').eq('lideranca', grupo);
    if (!membros?.length) { res.innerHTML = `<div class="vazio-central">Nenhum membro com liderança "${grupo}".</div>`; return; }
    const { data: lancamentos } = await supabase.from('lancamentos').select('data, valor, membro_id').eq('tipo', 'entrada').in('membro_id', membros.map(m => m.id)).gte('data', dataIni).lte('data', dataFim);
    const inicio = new Date(dataIni);
    const fim = new Date(dataFim);
    const mesesLabels = [];
    const current = new Date(inicio.getFullYear(), inicio.getMonth(), 1);
    while (current <= fim) { mesesLabels.push(current.toLocaleString('pt-BR', { month: 'long', year: 'numeric' })); current.setMonth(current.getMonth() + 1); }
    const numMeses = mesesLabels.length;
    const pessoas = new Map();
    membros.forEach(m => pessoas.set(m.id, { nome: m.nome, meses: new Array(numMeses).fill(0) }));
    lancamentos?.forEach(l => {
      const data = new Date(l.data);
      const idx = (data.getFullYear() - inicio.getFullYear()) * 12 + (data.getMonth() - inicio.getMonth());
      if (idx >= 0 && idx < numMeses && pessoas.has(l.membro_id)) pessoas.get(l.membro_id).meses[idx] += Number(l.valor);
    });
    const ordenadas = Array.from(pessoas.values()).sort((a,b) => a.nome.localeCompare(b.nome));
    const totaisMes = new Array(numMeses).fill(0);
    let totalGeral = 0;
    ordenadas.forEach(p => { p.meses.forEach((v, i) => { totaisMes[i] += v; totalGeral += v; }); });
    let html = `<div id="relatorio-tabela-container"><table class="tabela"><thead><tr><th>NOME</th>${mesesLabels.map(m => `<th>${m}</th>`).join('')}<th>TOTAL</th></tr></thead><tbody>`;
    ordenadas.forEach(p => {
      const totalPessoa = p.meses.reduce((s,v) => s+v, 0);
      html += `<tr><td>${p.nome}</td>${p.meses.map(v => `<td class="valor-cel">${fmt(v)}</td>`).join('')}<td class="valor-cel">${fmt(totalPessoa)}</td></tr>`;
    });
    html += `<tr style="background:#e2e8f0; font-weight:bold"><td>TOTAIS</td>${totaisMes.map(v => `<td class="valor-cel">${fmt(v)}</td>`).join('')}<td class="valor-cel">${fmt(totalGeral)}</td></tr>`;
    html += `</tbody></table></div>`;
    const dataEmissao = new Date().toLocaleString('pt-BR');
    res.innerHTML = `
      <div class="no-print" style="display:flex; gap:10px; margin-bottom:15px">
        <button class="btn-secondary" onclick="window._rep.exportarXLSX('relatorio-tabela-container', 'Lideranca_${grupo}')">📊 Excel</button>
        <button class="btn-primary" onclick="window.print()">🖨️ Imprimir</button>
      </div>
      <div class="print-header-bar"><h1>${branding?.nome_igreja || 'Igreja'}</h1><span>CONTRIBUIÇÕES - LIDERANÇA: ${grupo.toUpperCase()}</span><span>Período: ${fd(dataIni)} a ${fd(dataFim)}</span></div>
      ${html}
      <div class="print-footer">Gerado em ${dataEmissao}</div>
    `;
    return;
  }

  // ========== 5. CONTRIBUIÇÃO POR MINISTÉRIO (MATRIZ) ==========
  if (_repSubTipo === 'contribuicao_ministerio') {
    const dataIni = document.getElementById('rf-ini').value;
    const dataFim = document.getElementById('rf-fim').value;
    const grupo = document.getElementById('rf-grupo')?.value;
    if (!grupo) { res.innerHTML = '<div class="vazio-central">Selecione um ministério.</div>'; return; }
    const { data: membros } = await supabase.from('membros').select('id, nome').eq('ministerio', grupo);
    if (!membros?.length) { res.innerHTML = `<div class="vazio-central">Nenhum membro no ministério "${grupo}".</div>`; return; }
    const { data: lancamentos } = await supabase.from('lancamentos').select('data, valor, membro_id').eq('tipo', 'entrada').in('membro_id', membros.map(m => m.id)).gte('data', dataIni).lte('data', dataFim);
    const inicio = new Date(dataIni);
    const fim = new Date(dataFim);
    const mesesLabels = [];
    const current = new Date(inicio.getFullYear(), inicio.getMonth(), 1);
    while (current <= fim) { mesesLabels.push(current.toLocaleString('pt-BR', { month: 'long', year: 'numeric' })); current.setMonth(current.getMonth() + 1); }
    const numMeses = mesesLabels.length;
    const pessoas = new Map();
    membros.forEach(m => pessoas.set(m.id, { nome: m.nome, meses: new Array(numMeses).fill(0) }));
    lancamentos?.forEach(l => {
      const data = new Date(l.data);
      const idx = (data.getFullYear() - inicio.getFullYear()) * 12 + (data.getMonth() - inicio.getMonth());
      if (idx >= 0 && idx < numMeses && pessoas.has(l.membro_id)) pessoas.get(l.membro_id).meses[idx] += Number(l.valor);
    });
    const ordenadas = Array.from(pessoas.values()).sort((a,b) => a.nome.localeCompare(b.nome));
    const totaisMes = new Array(numMeses).fill(0);
    let totalGeral = 0;
    ordenadas.forEach(p => { p.meses.forEach((v, i) => { totaisMes[i] += v; totalGeral += v; }); });
    let html = `<div id="relatorio-tabela-container"><table class="tabela"><thead><tr><th>NOME</th>${mesesLabels.map(m => `<th>${m}</th>`).join('')}<th>TOTAL</th></tr></thead><tbody>`;
    ordenadas.forEach(p => {
      const totalPessoa = p.meses.reduce((s,v) => s+v, 0);
      html += `<tr><td>${p.nome}</td>${p.meses.map(v => `<td class="valor-cel">${fmt(v)}</td>`).join('')}<td class="valor-cel">${fmt(totalPessoa)}</td></tr>`;
    });
    html += `<tr style="background:#e2e8f0; font-weight:bold"><td>TOTAIS</td>${totaisMes.map(v => `<td class="valor-cel">${fmt(v)}</td>`).join('')}<td class="valor-cel">${fmt(totalGeral)}</td></tr>`;
    html += `</tbody></table></div>`;
    const dataEmissao = new Date().toLocaleString('pt-BR');
    res.innerHTML = `
      <div class="no-print" style="display:flex; gap:10px; margin-bottom:15px">
        <button class="btn-secondary" onclick="window._rep.exportarXLSX('relatorio-tabela-container', 'Ministerio_${grupo}')">📊 Excel</button>
        <button class="btn-primary" onclick="window.print()">🖨️ Imprimir</button>
      </div>
      <div class="print-header-bar"><h1>${branding?.nome_igreja || 'Igreja'}</h1><span>CONTRIBUIÇÕES - MINISTÉRIO: ${grupo.toUpperCase()}</span><span>Período: ${fd(dataIni)} a ${fd(dataFim)}</span></div>
      ${html}
      <div class="print-footer">Gerado em ${dataEmissao}</div>
    `;
    return;
  }

  // Se nenhum subtipo conhecido
  res.innerHTML = '<div class="vazio-central">Tipo de relatório não implementado para esta opção.</div>';
}

window._rep = {
    selecionarSub: relatoriosSelecionarSub,

    // CORRIGIDO: chama relatoriosRenderizar (re-renderiza os botões também)
    mudarSessao: (id) => {
        _repSession = id;
        _repSubTipo = null; // limpa sub-seleção ao trocar de sessão
        relatoriosRenderizar(document.getElementById('conteudo-principal'));
    },

    gerar: () => relatoriosGerar(),
    gerarEBD: () => relatoriosGerarEBD(),
    exportarXLSX: (id, nome) => {
        const tbl = document.getElementById(id);
        if (!tbl) return;
        const ws = XLSX.utils.table_to_sheet(tbl);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Relatório');
        XLSX.writeFile(wb, `${nome}.xlsx`);
    },
    formatarDataMascara: (el) => {
        let v = el.value.replace(/\D/g, '');
        if (v.length > 2) v = v.replace(/^(\d{2})(\d+)/, '$1/$2');
        el.value = v.slice(0, 5);
    }
};
  </script>
</body>
</html>
