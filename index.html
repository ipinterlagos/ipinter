<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Igreja Presbiteriana em Interlagos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600&family=DM+Sans:wght@400;500&family=Inter:wght@300;400;600;700&display=swap"
    rel="stylesheet">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;700&display=swap"
    rel="stylesheet">
  <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      /* Colors - Modern Emerald & Slate Palette */
      --primary: #065f46;
      /* Emerald 800 */
      --primary-light: #10b981;
      /* Emerald 500 */
      --primary-dark: #064e3b;
      /* Emerald 900 */
      --secondary: #d97706;
      /* Amber 600 (Gold) */
      --secondary-light: #fbbf24;
      /* Amber 400 */

      --bg-main: #f8fafc;
      /* Slate 50 */
      --bg-card: #ffffff;
      --bg-glass: rgba(255, 255, 255, 0.85);

      --text-main: #0f172a;
      /* Slate 900 */
      --text-muted: #64748b;
      /* Slate 500 */
      --text-white: #ffffff;

      --border: #e2e8f0;
      /* Slate 200 */
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;

      /* Shadows & Transitions */
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
      --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);

      --radius-sm: 6px;
      --radius: 12px;
      --radius-lg: 16px;

      --sidebar-width: 260px;

      /* Legacy variables (used by financial, dashboard, reports) */
      --verde: #10b981;
      --verde-cor: #065f46;
      --verde-claro: #d1fae5;
      --verde-claro-alt: #ecfdf5;
      --vermelho: #ef4444;
      --azul: #3b82f6;
      --branco: #ffffff;
      --texto: #0f172a;
      --texto-2: #64748b;
      --cinza-1: #f8fafc;
      --cinza-2: #e2e8f0;
      --cinza-3: #cbd5e1;
      --cinza-4: #64748b;
      --raio: 12px;
      --sombra-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --fonte-titulo: 'Outfit', sans-serif;
    }

    .hidden {
      display: none !important;
    }

    /* MEMBER CARDS */
    .card-grid {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .MEMBRO-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 16px;
      background: var(--bg-card);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      transition: var(--transition);
    }

    .MEMBRO-card:hover {
      box-shadow: var(--shadow);
      border-color: var(--primary-light);
    }

    .MEMBRO-card.incompleto {
      border-left: 3px solid var(--warning);
    }

    .MEMBRO-avatar {
      width: 42px;
      height: 42px;
      min-width: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.03em;
      font-family: 'Outfit', sans-serif;
    }

    .MEMBRO-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .MEMBRO-info strong {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-main);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .MEMBRO-info .MEMBRO-sub {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .tag-incompleto {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--warning);
      background: #fef3c7;
      padding: 1px 8px;
      border-radius: 100px;
      white-space: nowrap;
    }

    .MEMBRO-acoes {
      display: flex;
      gap: 4px;
      align-items: center;
      flex-shrink: 0;
    }

    .btn-icon {
      width: 34px;
      height: 34px;
      border: none;
      border-radius: var(--radius-sm);
      background: var(--bg-main);
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
      padding: 0;
    }

    .btn-icon:hover {
      background: var(--border);
      color: var(--text-main);
    }

    .btn-icon svg {
      width: 16px;
      height: 16px;
    }

    .btn-icon.btn-whatsapp {
      color: #25d366;
    }

    .btn-icon.btn-whatsapp:hover {
      background: #dcfce7;
    }

    .btn-icon.btn-danger:hover {
      background: #fee2e2;
      color: var(--danger);
    }

    .tabs-Membros {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
    }

    .tab-btn {
      padding: 8px 16px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      color: var(--text-muted);
      transition: var(--transition);
    }

    .tab-btn:hover {
      border-color: var(--primary-light);
      color: var(--primary);
    }

    .tab-btn.ativo {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .inp-busca {
      flex: 1;
      min-width: 200px;
      max-width: 400px;
    }

    .badge {
      background: var(--primary-light);
      color: white;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 2px 10px;
      border-radius: 100px;
      margin-left: 10px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-color: var(--bg-main);
      color: var(--text-main);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    h1,
    h2,
    h3,
    h4 {
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    /* LAYOUT STRUCTURE */
    #sistema {
      display: grid;
      grid-template-columns: var(--sidebar-width) 1fr;
      min-height: 100vh;
    }

    /* LOGIN SCREEN - PREMIUM GLASSMORPHISM */
    #tela-login {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--primary-dark) 0%, #064e3b 100%),
        url('https://images.unsplash.com/photo-1438232992991-995b7058bbb3?auto=format&fit=crop&q=80&w=2000');
      background-size: cover;
      background-blend-mode: multiply;
      padding: 20px;
    }

    .login-box {
      background: var(--bg-glass);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: var(--radius-lg);
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow-lg);
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-logo h1 {
      font-size: 2rem;
      color: var(--primary-dark);
      margin-bottom: 8px;
    }

    .login-logo p {
      color: var(--text-muted);
      font-size: 0.95rem;
      font-weight: 500;
    }

    .login-erro {
      background: #fee2e2;
      color: #b91c1c;
      padding: 12px;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      margin-bottom: 16px;
      border: 1px solid #fecaca;
      display: none;
    }

    /* SIDEBAR NAVIGATION */
    .sidebar {
      background: var(--primary-dark);
      color: white;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 0;
      height: 100vh;
      border-right: 1px solid rgba(255, 255, 255, 0.1);
      z-index: 100;
    }

    .sidebar-header {
      padding: 0 12px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .sidebar-header img {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: white;
    }

    .sidebar-header h2 {
      font-size: 1.1rem;
      line-height: 1.2;
      letter-spacing: -0.01em;
    }

    .nav {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
    }

    .nav-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      color: rgba(255, 255, 255, 0.7);
      text-decoration: none;
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      font-weight: 500;
      transition: var(--transition);
      cursor: pointer;
      border: none;
      background: transparent;
      width: 100%;
      text-align: left;
    }

    .nav-btn i {
      font-size: 1.25rem;
    }

    .nav-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      color: white;
    }

    .nav-btn.ativo {
      background: var(--primary-light);
      color: white;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
    }

    .sidebar-footer {
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* TOPBAR - SEARCH & PROFILE */
    .main-content {
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    .topbar {
      height: 72px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 90;
    }

    .topbar-search {
      display: flex;
      align-items: center;
      background: var(--bg-main);
      padding: 8px 16px;
      border-radius: 100px;
      width: 300px;
      gap: 10px;
      border: 1px solid transparent;
      transition: var(--transition);
    }

    .topbar-search:focus-within {
      background: white;
      border-color: var(--primary-light);
      box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
    }

    .topbar-search input {
      border: none;
      background: transparent;
      width: 100%;
      outline: none;
      font-size: 0.9rem;
    }

    .topbar-user {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .user-info {
      text-align: right;
    }

    .user-info .name {
      display: block;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .user-info .role {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .btn-logout {
      background: #f1f5f9;
      color: #ef4444;
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: var(--transition);
    }

    .btn-logout:hover {
      background: #fee2e2;
      transform: translateY(-2px);
    }

    /* CONTENT AREA */
    .conteudo {
      padding: 32px;
      animation: fadeIn 0.4s ease-out;
    }

    /* MODERN COMPONENTS */
    .card {
      background: var(--bg-card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
      border: 1px solid var(--border);
      transition: var(--transition);
    }

    .card:hover {
      box-shadow: var(--shadow-lg);
    }

    .mod-header {
      margin-bottom: 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .mod-header h2 {
      font-size: 1.75rem;
      color: var(--text-main);
    }

    .btn-primary {
      background: var(--primary);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: var(--radius-sm);
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(6, 95, 70, 0.2);
    }

    .btn-secondary {
      background: white;
      color: var(--text-main);
      border: 1px solid var(--border);
      padding: 10px 20px;
      border-radius: var(--radius-sm);
      font-weight: 500;
      font-size: 0.9rem;
      cursor: pointer;
      transition: var(--transition);
    }

    .btn-secondary:hover {
      background: var(--bg-main);
    }

    /* TABLES */
    .tabela-wrapper {
      background: white;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
      margin-top: 20px;
    }

    .tabela {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    .tabela th {
      background: #f8fafc;
      padding: 16px;
      text-align: left;
      font-weight: 600;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
    }

    .tabela td {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    .tabela tr:last-child td {
      border-bottom: none;
    }

    .tabela tr:hover td {
      background: #fdfdfd;
    }

    /* DASHBOARD CARDS */
    .dash-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 24px;
      margin-bottom: 32px;
    }

    .dash-card {
      background: white;
      padding: 24px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 12px;
      position: relative;
      overflow: hidden;
    }

    .dash-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: var(--primary-light);
    }

    .dash-card-title {
      color: var(--text-muted);
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .dash-card-value {
      font-size: 2.25rem;
      font-weight: 700;
      color: var(--text-main);
      font-family: 'Outfit', sans-serif;
    }

    .dash-card-sub {
      font-size: 0.8rem;
      color: var(--success);
      font-weight: 500;
    }

    /* FORMS & GRIDS */
    .form-section-title {
      grid-column: 1 / -1;
      font-size: 1rem;
      color: var(--primary-dark);
      margin-top: 16px;
      margin-bottom: 8px;
      padding-bottom: 6px;
      border-bottom: 2px solid var(--border);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      padding: 24px;
    }

    .form-group.full {
      grid-column: 1 / -1;
    }

    .form-row-flex {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .form-row-flex label {
      margin-bottom: 0 !important;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      font-size: 0.95rem;
      transition: var(--transition);
      background: #fcfcfc;
    }

    input:focus {
      outline: none;
      border-color: var(--primary-light);
      background: white;
      box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
    }

    /* MODALS */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
      animation: fadeIn 0.3s ease-out;
    }

    .modal-box {
      background: white;
      border-radius: var(--radius-lg);
      width: 100%;
      max-width: 700px; /* Aumentado um pouco para acomodar abas */
      box-shadow: var(--shadow-lg);
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .modal-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #fcfcfc;
    }

    .modal-body-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 0;
    }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding: 16px 20px;
      background: #fcfcfc;
      border-top: 1px solid var(--border);
    }

    /* TABS SYSTEM IN MODAL */
    .modal-tabs {
      display: flex;
      background: #f1f5f9;
      padding: 0 12px;
      border-bottom: 1px solid var(--border);
      gap: 4px;
    }

    .m-tab-btn {
      padding: 12px 20px;
      border: none;
      background: transparent;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      position: relative;
      transition: var(--transition);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .m-tab-btn:hover {
      color: var(--primary);
    }

    .m-tab-btn.ativo {
      color: var(--primary);
    }

    .m-tab-btn.ativo::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--primary);
      border-radius: 3px 3px 0 0;
    }

    .m-tab-content {
      display: none;
      padding: 0;
    }

    .m-tab-content.ativo {
      display: block;
    }

    .fin-card.entrada {
      border-left-color: var(--verde);
    }

    .fin-card.saida {
      border-left-color: var(--vermelho);
    }

    .fin-card.positivo {
      border-left-color: var(--azul);
    }

    .fin-card.negativo {
      border-left-color: var(--vermelho);
    }

    .fin-label {
      display: block;
      font-size: .75rem;
      color: var(--cinza-4);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .fin-valor {
      font-size: 1.3rem;
      font-weight: 500;
      font-family: var(--fonte-titulo);
    }

    .fin-card.entrada .fin-valor {
      color: var(--verde);
    }

    .fin-card.saida .fin-valor {
      color: var(--vermelho);
    }

    .fin-grafico {
      background: var(--branco);
      border-radius: var(--raio);
      box-shadow: var(--sombra-sm);
      padding: 16px 20px;
      margin-bottom: 16px;
      font-size: .875rem;
    }

    .cat-row {
      display: grid;
      grid-template-columns: 120px 1fr auto;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .cat-nome {
      font-size: .8rem;
      color: var(--texto-2);
    }

    .cat-bars {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .cat-bar {
      height: 6px;
      border-radius: 3px;
      min-width: 4px;
    }

    .bar-entrada {
      background: var(--verde);
    }

    .bar-saida {
      background: var(--vermelho);
    }

    .cat-total {
      font-size: .75rem;
      color: var(--cinza-4);
      white-space: nowrap;
    }

    .tabela {
      width: 100%;
      border-collapse: collapse;
      font-size: .875rem;
      background: var(--branco);
      border-radius: var(--raio);
      overflow: hidden;
      box-shadow: var(--sombra-sm);
    }

    .tabela th {
      background: var(--cinza-1);
      padding: 10px 14px;
      text-align: left;
      font-size: .78rem;
      font-weight: 500;

    async function login(email, senha) {
      console.log('🔑 Tentando login com:', email?.trim());
      if (!email || !senha) throw new Error('Email e senha são obrigatórios.');

      // 1. Autentica via Supabase Auth (gera token JWT seguro)
      const { data: authData, error: authError } = await supabase.auth.signInWithPassword({
        email: email.trim().toLowerCase(),
        password: senha.trim()
      });

      if (authError) {
        if (authError.message?.toLowerCase().includes('invalid login')) {
          throw new Error('Email ou senha incorretos.');
        }
        throw new Error(authError.message);
      }

      // 2. Busca o perfil do usuário na tabela public.usuarios
      const { data: perfData, error: perfError } = await supabase
        .from('usuarios')
        .select('perfil, pode_editar')
        .eq('id', authData.user.id)
        .single();

      if (perfError || !perfData) throw new Error('Perfil de acesso não encontrado. Contacte o administrador.');

      perfilAtual = perfData.perfil;
      localStorage.setItem('perfil', perfilAtual);
      localStorage.setItem('pode_editar', perfData.pode_editar !== false ? '1' : '0');

      console.log('✅ Login bem-sucedido! Perfil:', perfilAtual);
      return perfilAtual;
    }

        console.log('🎉 Sistema carregado com sucesso!');
        
      } catch (e) {
        console.error('❌ Erro:', e);
        if (erroEl) {
          erroEl.textContent = e.message;
          erroEl.style.display = 'block';
        }
      } finally {
        if (btnLogin) {

          btnLogin.disabled = false;

      supabase.auth.getSession().then(async ({ data: { session } }) => {

          const { data: perfData } = await supabase

   function preencherFormMembro(data) {
  // Helper seguro para buscar nome a partir de ID no datalist
  const dl = document.getElementById('lista-Membros-familia');
  const getNome = (id) => {
    if (!id || !dl) return '';
    const opt = Array.from(dl.options).find(o => o.dataset.id === String(id));
    return opt ? opt.value : '';
  };

  // Preenche campos simples
  document.getElementById('m-nome').value = data.nome || '';
  document.getElementById('m-telefone').value = data.telefone || '';
  document.getElementById('m-celular').value = data.celular || '';
  document.getElementById('m-email').value = data.email || '';
  document.getElementById('m-sexo').value = data.sexo || '';
  document.getElementById('m-nascimento').value = data.data_nascimento?.slice(0, 10) || '';
  document.getElementById('m-naturalidade').value = data.naturalidade || '';
  document.getElementById('m-estado-civil').value = data.estado_civil || '';
  document.getElementById('m-casamento').value = data.data_casamento?.slice(0, 10) || '';
  document.getElementById('m-endereco').value = data.endereco || '';
  document.getElementById('m-numero').value = data.numero || '';
  document.getElementById('m-bairro').value = data.bairro || '';
  document.getElementById('m-cidade').value = [data.cidade, data.uf].filter(Boolean).join(' / ');
  document.getElementById('m-modo-admissao').value = data.modo_admissao || '';
  document.getElementById('m-admissao').value = data.data_admissao?.slice(0, 10) || '';
  document.getElementById('m-arrolamento').value = data.arrolamento || '';
  document.getElementById('m-tipo-comunhao').value = data.tipo || 'Comungante';
  document.getElementById('m-ministerio').value = data.ministerio || 'Nenhum';
  document.getElementById('m-lideranca').value = data.lideranca || 'MEMBRO comum';
  document.getElementById('m-profissao').value = data.profissao || '';
  document.getElementById('m-escolaridade').value = data.escolaridade || '';
  document.getElementById('m-igreja-origem').value = data.igreja_origem || '';

  // Familiares (cônjuge, pai, mãe)
  const setFamiliar = (tipo, dbId, nomeTexto) => {
    const check = document.getElementById(`m-${tipo}-MEMBRO`);
    if (!check) return;
    const ehMembro = !!dbId;
    check.checked = ehMembro;
    MembrosToggleFamiliar(tipo);
    const idEl = document.getElementById(`m-${tipo}-id`);
    const nomeEl = document.getElementById(`m-${tipo}-nome`);
    if (ehMembro) {
      if (idEl) idEl.value = getNome(dbId);
      if (nomeEl) nomeEl.value = '';
    } else {
      if (idEl) idEl.value = '';
      if (nomeEl) nomeEl.value = nomeTexto || '';
    }
  };
  setFamiliar('conjuge', data.conjuge_id, data.nome_conjuge);
  setFamiliar('pai', data.pai_id, data.nome_pai);
  setFamiliar('mae', data.mae_id, data.nome_mae);

  // Filhos legados (campos antigos filho1_id, filho2_id, filho3_id)
  const filhosIds = [data.filho1_id, data.filho2_id, data.filho3_id].filter(Boolean);
  const relContainer = document.getElementById('m-rel-container');
  if (relContainer) relContainer.innerHTML = '';
  filhosIds.forEach(fid => {
    const nomeFilho = getNome(fid);
    if (nomeFilho) MembrosAddRel('Filho(a)', nomeFilho);
  });

  // Relacionamentos dinâmicos (JSON em observacoes)
  let rels = [];
  try {
    if (data.observacoes) {
      const parsed = JSON.parse(data.observacoes);
      if (Array.isArray(parsed)) rels = parsed;
      else if (typeof parsed === 'string') rels.push({ tipo: 'Outro', nome: parsed });
      else rels = [];
    }
  } catch (e) {
    console.warn('Erro ao parsear observacoes (JSON inválido):', data.observacoes, e);
    // Se não for JSON, trata como texto simples
    if (data.observacoes && typeof data.observacoes === 'string' && data.observacoes.trim()) {
      rels.push({ tipo: 'Outro', nome: data.observacoes });
    }
  }
  rels.forEach(r => {
    if (r.nome && r.tipo) MembrosAddRel(r.tipo, r.nome);
  });
}

    async function MembrosImportarCSV() {
      const file = document.getElementById('csv-file')?.files[0];
      if (!file) { alert('Selecione um arquivo CSV.'); return; }
      const res = document.getElementById('csv-resultado');
      res.innerHTML = '<p class="hint">Processando atualização segura</p>';

      const { data: MembrosAtuais } = await supabase.from('membros').select('id, nome');
      const mapaMembros = {};
      MembrosAtuais?.forEach(m => mapaMembros[m.nome.trim().toUpperCase()] = m.id);

      const reader = new FileReader();
      reader.onload = async e => {
        const text = e.target.result.replace(/\r/g, '');
        const linhas = text.split('\n').filter(l => l.trim());
        if (linhas.length < 2) { res.innerHTML = '<p class="erro">Arquivo vazio.</p>'; return; }

        const cabLinha = linhas[0];
        let sep = ';';
        if (cabLinha.includes('\t')) sep = '\t';
        else {
          const cS = cabLinha.split(';').length;
          const cV = cabLinha.split(',').length;
          sep = (cS >= cV) ? ';' : ',';
        }

        const parseLinha = (str) => utilParseCSV(str, sep);

        const cab = parseLinha(cabLinha).map(h => h.toUpperCase());
        const col = n => cab.indexOf(n.toUpperCase());
        const toISO = d => utilToISO(d);

        let criados = 0;
        let atualizados = 0;
        let erros = 0;

        for (let i = 1; i < linhas.length; i++) {
          const cols = parseLinha(linhas[i]);
          const get = (aliases) => {
            const ks = Array.isArray(aliases) ? aliases : [aliases];
            for (const k of ks) {
              const idx = col(k);
              if (idx !== -1 && cols[idx]) return cols[idx];
            }
            return null;
          };

          const nomeRaw = get('NOME');
          if (!nomeRaw) continue;
          const nomeUpper = nomeRaw.trim().toUpperCase();

          const dados = {};
          const mapear = (aliases, dbField, isDate = false) => {
            let val = get(aliases);
            if (val && val !== '') {
              if (dbField === 'sexo') {
                const v = val.toUpperCase();
                if (v.startsWith('M')) val = 'M';
                else if (v.startsWith('F')) val = 'F';
              }
              if (dbField === 'estado_civil') {
                const v = val.toUpperCase();
                if (v.includes('SOLTEIR')) val = 'Solteiro(a)';
                else if (v.includes('CASAD')) val = 'Casado(a)';
                else if (v.includes('DIVORCI')) val = 'Divorciado(a)';
                else if (v.includes('VIUV') || v.includes('VIV')) val = 'Viúvo(a)';
              }
              dados[dbField] = isDate ? toISO(val) : val;
            }
          };

          mapear('NOME', 'nome');
          mapear(['TELEFONE', 'TEL', 'FONE'], 'telefone');
          mapear(['CELULAR', 'CEL', 'WHATSAPP'], 'celular');
          mapear(['EMAIL', 'E-MAIL'], 'email');
          mapear('SEXO', 'sexo');
          mapear(['DATA NASC.', 'NASCIMENTO', 'DATA DE NASCIMENTO', 'NASC'], 'data_nascimento', true);
          mapear(['NATURALIDADE', 'LOCAL NASCIMENTO'], 'naturalidade');
          mapear(['ESTADO CIVIL', 'ESTADO-CIVIL', 'SITUACAO'], 'estado_civil');
          mapear(['DATA CASAMENTO', 'CASAMENTO'], 'data_casamento', true);
          mapear(['ENDERECO', 'ENDEREÇO'], 'endereco');
          mapear(['NÚMERO', 'NÚMERO', 'N'], 'numero');
          mapear('BAIRRO', 'bairro');
          mapear('CIDADE', 'cidade');
          mapear('UF', 'uf');
          mapear('CEP', 'cep');
          mapear('ARROLAMENTO', 'arrolamento');
          mapear(['DATA ADMISSAO', 'DATA DE ADMISSÃO', 'ADMISSÃO', 'DATA ADMISSÃO'], 'data_admissao', true);
          mapear('MODO ADMISSAO', 'modo_admissao');
          mapear(['TIPO', 'CATEGORIA'], 'tipo');

          try {
            if (mapaMembros[nomeUpper]) {
              const { error } = await supabase.from('membros').update(dados).eq('id', mapaMembros[nomeUpper]);
              if (error) throw error;
              atualizados++;
            } else {
              if (!dados.data_admissao) dados.data_admissao = new Date().toISOString();
              if (!dados.modo_admissao) dados.modo_admissao = 'importado';
              if (!dados.tipo) dados.tipo = _mTab === 'Visitante' ? 'Comungante' : _mTab;
              const { error } = await supabase.from('membros').insert([dados]);
              if (error) throw error;
              criados++;
            }
          } catch (err) {
            console.error('Erro na linha ' + i, err);
            erros++;
          }
        }
        res.innerHTML = `<p class="sucesso">Importação concluída! ${criados} novos, ${atualizados} atualizados. ${erros ? erros + ' erros.' : ''}</p>`;
        MembrosCarregar();
      };
      reader.readAsText(file, 'UTF-8');
    }
    async function visitantesLimpar() {
      if (!confirm('Deseja buscar e mesclar visitantes com nomes idênticos? (Isso manterá apenas um registro e atualizará os lançamentos financeiros).')) return;
      const { data: vs } = await supabase.from('visitantes').select('*');
      if (!vs) return;
      const grupos = {};
      vs.forEach(v => { const n = normalizarTexto(v.nome); if (!grupos[n]) grupos[n] = []; grupos[n].push(v); });
      let totalmesclados = 0;
      for (const n in grupos) {
        const list = grupos[n];
        if (list.length > 1) {
          const principal = list[0];
          const duplicados = list.slice(1);
          for (const d of duplicados) {
            await supabase.from('lancamentos').update({ visitante_id: principal.id }).eq('visitante_id', d.id);
            await supabase.from('visitantes').delete().eq('id', d.id);
            totalmesclados++;
          }
        }
      }
      alert(totalmesclados > 0 ? `${totalmesclados} registros duplicados foram mesclados!` : 'Nenhum duplicado encontrado.');
      await MembrosCarregar();
    }

          <button class="btn-secondary" onclick="window._ebd.fecharModalTurma()">Cancelar</button>

          <input type="hidden" id="migrar-aluno-id">

}

async function ebdCarregarTurmas() {
  const { data: turmas } = await supabase.from('turmas_ebd').select('*').order('nome');
  _ebdCacheTurmas = turmas || [];
  const container = document.getElementById('lista-turmas');
  if (!container) return;
  if (!turmas?.length) { container.innerHTML = '<p class="vazio">Nenhuma turma.</p>'; return; }
  container.innerHTML = turmas.map(t => `
    <div class="ebd-tab-btn ${_ebdTurma?.id === t.id ? 'ativa' : ''}" onclick="window._ebd.selecionar('${t.id}')">${t.nome}</div>
  `).join('');
  if (window.lucide) lucide.createIcons();
}

function ebdSelecionar(id) {
  _ebdTurma = _ebdCacheTurmas.find(t => t.id === id);
  ebdCarregarTurmas();
  ebdRenderizarTurma();
}

async function ebdRenderizarTurma() {
  const c = document.getElementById('ebd-conteudo');
  const t = _ebdTurma;
  if (!t || !c) return;

  c.innerHTML = '<div class="vazio-central">Carregando...</div>';
  const { data: alunos } = await supabase.from('ebd_alunos').select('*').eq('turma_id', t.id).order('nome');
  let dataSelecionada = sessionStorage.getItem(`data_chamada_${t.id}`);
  if (!dataSelecionada) {
    dataSelecionada = new Date().toISOString().slice(0, 10);
    sessionStorage.setItem(`data_chamada_${t.id}`, dataSelecionada);
  }
  const { data: chamadas } = await supabase.from('ebd_chamadas').select('*').eq('turma_id', t.id).eq('data', dataSelecionada);

  const professores = (t.professor || '').split(',').map(p => p.trim()).filter(Boolean);

  c.innerHTML = `
    <div class="ebd-turma-detalhe">
      <div class="ebd-detalhe-header" style="display:flex; justify-content:space-between;">
        <div><h2>${t.nome}</h2><p class="hint">${t.horario || ''} ${t.faixa_etaria ? ' • ' + t.faixa_etaria : ''}</p></div>
        <div><button class="btn-secondary btn-sm" onclick="window._ebd.abrirModalTurma('${t.id}')">Editar Turma</button>
        <button class="btn-danger btn-sm" onclick="window._ebd.excluirTurma('${t.id}','${t.nome}')">Excluir</button></div>
      </div>
      <div class="ebd-panel"><h3>Professores</h3><div>${professores.map(p => `<div class="ebd-prof-tag">${p}</div>`).join('') || 'Nenhum'}</div></div>
      <div class="ebd-tabs-container">
        <div class="ebd-tab-btn ${_ebdSubTab === 'alunos' ? 'ativa' : ''}" onclick="window._ebd.mudarSubTab('alunos')">Matriculados</div>
        <div class="ebd-tab-btn ${_ebdSubTab === 'chamada' ? 'ativa' : ''}" onclick="window._ebd.mudarSubTab('chamada')">Fazer Chamada</div>
      </div>
      ${_ebdSubTab === 'alunos' ? `
        <div class="ebd-panel">
          <div style="display:flex; gap:10px;"><input id="a-nome-inline" list="lista-Membros-geral" placeholder="Buscar Membro/Visitante"><button class="btn-primary" onclick="window._ebd.salvarAlunoInline()">+ Matricular</button></div>
          <h4>Alunos Matriculados (${alunos?.length || 0})</h4>
          <div class="ebd-alunos-list">
            ${alunos?.map(a => `
              <div style="display:flex; justify-content:space-between; align-items:center; background:white; padding:12px 16px; border-radius:10px; border:1px solid #e2e8f0; margin-bottom:8px">
                <span style="font-weight:700;">${a.nome}</span>
                <div><button class="btn-icon" onclick="window._ebd.abrirMigrar('${a.id}','${a.nome}')">✈️</button><button class="btn-icon btn-danger" onclick="window._ebd.excluirAluno('${a.id}')">🗑️</button></div>
              </div>
            `).join('') || '<p class="vazio">Nenhum aluno matriculado.</p>'}
          </div>
        </div>
      ` : `
        <div class="ebd-panel">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <h3>Chamada do Dia</h3>
            <div style="display:flex; gap:10px;">
              <input type="date" id="data-chamada" value="${dataSelecionada}" onchange="window._ebd.carregarChamadaPorData(this.value)">
              <button class="btn-secondary btn-sm" onclick="window._ebd.excluirChamada()" style="background:#dc2626;color:white;border:none;">🗑️ Excluir Chamada</button>
            </div>
          </div>
          <div id="chamada-container">${renderizarListaAlunos(alunos, chamadas)}</div>
          <button class="btn-primary" style="margin-top:20px; width:100%;" onclick="window._ebd.salvarChamada()">FINALIZAR CHAMADA</button>
        </div>
      `}
    </div>
  `;
  if (_ebdSubTab === 'chamada') {
    setTimeout(() => aplicarEstilosIniciais(alunos), 50);
  }
  if (window.lucide) lucide.createIcons();
}

function renderizarListaAlunos(alunos, chamadas) {
  if (!alunos?.length) return '<p class="vazio">Matricule alunos primeiro.</p>';
  return alunos.map(a => {
    const status = chamadas?.find(c => c.aluno_id === a.id);
    const presenteInicial = status?.presente === true ? '1' : (status?.presente === false ? '0' : '');
    return `
      <div style="display:flex; justify-content:space-between; align-items:center; background:white; padding:15px; border-radius:12px; border:1px solid #e2e8f0; margin-bottom:10px">
        <span style="font-weight:600; flex:1">${a.nome}</span>
        <div style="display:flex; gap:10px" id="switch-${a.id}">
          <button type="button" data-aluno="${a.id}" data-val="1" onclick="window._ebd.marcarPresenca(this)" style="width:45px; height:45px; border-radius:8px; border:1px solid #ddd; font-weight:800; cursor:pointer">P</button>
          <button type="button" data-aluno="${a.id}" data-val="0" onclick="window._ebd.marcarPresenca(this)" style="width:45px; height:45px; border-radius:8px; border:1px solid #ddd; font-weight:800; cursor:pointer">F</button>
          <input type="hidden" id="presenca-${a.id}" value="${presenteInicial}">
        </div>
      </div>
    `;
  }).join('');
}

function aplicarEstilosIniciais(alunos) {
  alunos?.forEach(a => {
    const hidden = document.getElementById(`presenca-${a.id}`);
    if (hidden?.value === '1') {
      const btnP = document.querySelector(`#switch-${a.id} button[data-val="1"]`);
      if (btnP) window._ebd.marcarPresenca(btnP);
    } else if (hidden?.value === '0') {
      const btnF = document.querySelector(`#switch-${a.id} button[data-val="0"]`);
      if (btnF) window._ebd.marcarPresenca(btnF);
    }
  });
}

function ebdMarcarPresenca(btn) {
  const alunoId = btn.dataset.aluno;
  const val = btn.dataset.val;
  const container = document.getElementById(`switch-${alunoId}`);
  if (!container) return;
  const [btnP, btnF] = container.querySelectorAll('button');
  btnP.style.background = '#f1f5f9'; btnP.style.color = '#64748b';
  btnF.style.background = '#f1f5f9'; btnF.style.color = '#64748b';
  if (val === '1') {
    btnP.style.background = '#10b981'; btnP.style.color = 'white';
  } else {
    btnF.style.background = '#ef4444'; btnF.style.color = 'white';
  }
  const hidden = document.getElementById(`presenca-${alunoId}`);
  if (hidden) hidden.value = val;
}

async function ebdSalvarChamada() {
  const data = document.getElementById('data-chamada').value;
  if (!data) return;
  const regs = [];
  document.querySelectorAll('[id^="presenca-"]').forEach(hidden => {
    const alunoId = hidden.id.replace('presenca-', '');
    const presente = hidden.value === '1' ? true : (hidden.value === '0' ? false : null);
    if (presente !== null) regs.push({ turma_id: _ebdTurma.id, aluno_id: alunoId, data, presente });
  });
  if (regs.length === 0) { alert('Marque a presença de ao menos um aluno.'); return; }
  await supabase.from('ebd_chamadas').delete().eq('turma_id', _ebdTurma.id).eq('data', data);
  const { error } = await supabase.from('ebd_chamadas').insert(regs);
  if (error) alert('Erro ao salvar: ' + error.message);
  else { alert('Frequência salva com sucesso!'); ebdRenderizarTurma(); }
}

async function ebdCarregarChamadaPorData(novaData) {
  if (!_ebdTurma) return;
  sessionStorage.setItem(`data_chamada_${_ebdTurma.id}`, novaData);
  const { data: alunos } = await supabase.from('ebd_alunos').select('*').eq('turma_id', _ebdTurma.id).order('nome');
  const { data: chamadas } = await supabase.from('ebd_chamadas').select('*').eq('turma_id', _ebdTurma.id).eq('data', novaData);
  const container = document.getElementById('chamada-container');
  if (container) {
    container.innerHTML = renderizarListaAlunos(alunos, chamadas);
    aplicarEstilosIniciais(alunos);
  }
  const dataInput = document.getElementById('data-chamada');
  if (dataInput) dataInput.value = novaData;
}

async function ebdExcluirChamada() {
  const data = document.getElementById('data-chamada').value;
  if (!data) return;
  if (!confirm(`Excluir TODOS os registros de chamada do dia ${data.split('-').reverse().join('/')}?`)) return;
  await supabase.from('ebd_chamadas').delete().eq('turma_id', _ebdTurma.id).eq('data', data);
  alert('Chamada excluída com sucesso!');
  ebdRenderizarTurma();
}

async function ebdSalvarAlunoInline() {
  const input = document.getElementById('a-nome-inline');
  const nome = input.value.trim();
  if (!nome) { alert('Digite o nome do aluno.'); return; }
  const dl = document.getElementById('lista-Membros-geral');
  const membroId = Array.from(dl.options).find(o => o.value === nome)?.dataset.id || null;
  const { error } = await supabase.from('ebd_alunos').insert([{ turma_id: _ebdTurma.id, nome, membro_id: membroId }]);
  if (error) { alert('Erro: ' + error.message); return; }
  input.value = '';
  ebdRenderizarTurma();
}

async function ebdSalvarTurma() {
  const nome = document.getElementById('t-nome').value.trim();
  if (!nome) { alert('Nome é obrigatório.'); return; }
  const payload = { nome, professor: document.getElementById('t-professor').value, horario: document.getElementById('t-horario').value, faixa_etaria: document.getElementById('t-faixa').value };
  try {
    if (_ebdTurma && _ebdTurma.id) await supabase.from('turmas_ebd').update(payload).eq('id', _ebdTurma.id);
    else await supabase.from('turmas_ebd').insert([payload]);
    ebdFecharModalTurma();
    ebdCarregarTurmas();
  } catch (e) { alert('Erro: ' + e.message); }
}

async function ebdExcluirTurma(id, nome) {
  if (!confirm(`Excluir turma "${nome}"? Alunos e chamadas serão apagados.`)) return;
  await supabase.from('turmas_ebd').delete().eq('id', id);
  _ebdTurma = null;
  ebdCarregarTurmas();
  document.getElementById('ebd-conteudo').innerHTML = '<div class="vazio-central">Selecione uma turma</div>';
}

function ebdAbrirModalTurma(id = null) {
  const t = id ? _ebdCacheTurmas.find(x => x.id === id) : null;
  _ebdTurma = t;
  document.getElementById('mt-titulo').textContent = t ? 'Editar Turma' : 'Nova Turma';
  document.getElementById('t-nome').value = t?.nome || '';
  document.getElementById('t-horario').value = t?.horario || '';
  document.getElementById('t-faixa').value = t?.faixa_etaria || '';
  document.getElementById('t-professor').value = t?.professor || '';
  ebdRenderProfTags(t?.professor || '');
  document.getElementById('modal-turma').classList.remove('hidden');
}

function ebdFecharModalTurma() { document.getElementById('modal-turma').classList.add('hidden'); }

function ebdRenderProfTags(profStr) {
  const container = document.getElementById('t-prof-tags');
  if (!container) return;
  const profs = profStr.split(',').map(p => p.trim()).filter(Boolean);
  container.innerHTML = profs.map(p => `<div class="ebd-prof-tag"><span>${p}</span><button onclick="window._ebd.removeProfTag('${p}')">×</button></div>`).join('');
  document.getElementById('t-professor').value = profs.join(', ');
}

function ebdAddProfTag() {
  const input = document.getElementById('t-prof-busca');
  const nome = input.value.trim();
  if (!nome) return;
  const current = document.getElementById('t-professor').value;
  const profs = current.split(',').map(p => p.trim()).filter(Boolean);
  if (!profs.includes(nome)) { profs.push(nome); ebdRenderProfTags(profs.join(', ')); }
  input.value = '';
}

function ebdRemoveProfTag(nome) {
  const current = document.getElementById('t-professor').value;
  const profs = current.split(',').map(p => p.trim()).filter(Boolean);
  ebdRenderProfTags(profs.filter(p => p !== nome).join(', '));
}

function ebdAbrirMigrar(alunoId, alunoNome) {
  document.getElementById('migrar-aluno-id').value = alunoId;
  document.getElementById('migrar-aluno-nome').textContent = alunoNome;
  const sel = document.getElementById('migrar-turma-destino');
  if (sel) {
    sel.innerHTML = _ebdCacheTurmas.filter(t => t.id !== _ebdTurma.id).map(t => `<option value="${t.id}">${t.nome}</option>`).join('');
    if (sel.options.length === 0) { alert('Não existem outras turmas.'); return; }
  }
  document.getElementById('modal-migrar-aluno').classList.remove('hidden');
}

async function ebdExecutarMigracao() {
  const alunoId = document.getElementById('migrar-aluno-id').value;
  const novaTurmaId = document.getElementById('migrar-turma-destino').value;
  const { error } = await supabase.from('ebd_alunos').update({ turma_id: novaTurmaId }).eq('id', alunoId);
  if (error) alert('Erro: ' + error.message);
  else { alert('Aluno migrado!'); document.getElementById('modal-migrar-aluno').classList.add('hidden'); ebdRenderizarTurma(); }
}

async function ebdExcluirAluno(id) {
  if (!confirm('Remover matrícula deste aluno?')) return;
  await supabase.from('ebd_alunos').delete().eq('id', id);
  ebdRenderizarTurma();
}

function ebdMudarSubTab(tab) { _ebdSubTab = tab; ebdRenderizarTurma(); }

// ========== OBJETO GLOBAL ==========

};

async function gruposCarregar() {
  const { data, error } = await supabase.from('grupos').select('*').order('nome');
  if (error) return;
  _grpCache = data;
  
  const l = document.getElementById('lista-grupos'); if (!l) return;
  const filtrados = data.filter(g => g.tipo === _grpSubTab);
  
  if (!filtrados.length) {
    const msg = _grpSubTab === 'ministerios' ? 'Nenhum ministério cadastrado.' : 'Nenhuma célula cadastrada.';
    l.innerHTML = `<div class="vazio" style="padding:20px; width:100%">${msg}</div>`;
    return;
  }

  l.innerHTML = filtrados.map(g => {
    const isCel = g.tipo === 'celulas';
    const icon = isCel ? 'home' : 'users';
    const meta = isCel ? `<div class="btn-sub"><strong>Líder:</strong> ${g.lider || '-'}<br><strong>Anfitrião:</strong> ${g.anfitriao || '-'}</div>` : `<div class="btn-sub"><strong>Líder:</strong> ${g.lider || '-'}</div>`;
    return `
        <div class="celula-btn ${_grpActive?.id === g.id ? 'ativa' : ''}" onclick="window._grp.selecionar('${g.id}')">
            <div class="grp-card-icon"><i data-lucide="${icon}" style="width:20px"></i></div>
            <strong>${g.nome}</strong>
            ${meta}
        </div>

async function gruposSalvar() {
  const id = document.getElementById('g-id').value;
  const dados = {
    nome: document.getElementById('g-nome').value,
    tipo: document.getElementById('g-tipo').value,
    lider: document.getElementById('g-lider').value,
    descricao: document.getElementById('g-descricao')?.value || '',
    conselheiro: document.getElementById('g-conselheiro')?.value || '',
    supervisor: document.getElementById('g-supervisor')?.value || '',
    anfitriao: document.getElementById('g-anfitriao')?.value || '',
    bairro: document.getElementById('g-bairro')?.value || '',
    rua: document.getElementById('g-rua')?.value || '',
    horario: document.getElementById('g-horario')?.value || ''
  };

  if (!dados.nome) { alert('O nome é obrigatório.'); return; }

  try {
    console.log('Salvando dados do grupo:', dados);
    let res;
    if (id) {
      res = await supabase.from('grupos').update(dados).eq('id', id);
    } else {
      res = await supabase.from('grupos').insert([dados]);
    }
    
    if (res.error) {
      console.error('Erro do Supabase ao salvar:', res.error);
      alert('Erro ao salvar no banco de dados: ' + res.error.message);
      return;
    }

    alert('Registro salvo com sucesso!');
    grucharFecharModal();
    gruposCarregar();
  } catch (e) { 
    console.error('Erro inesperado ao salvar:', e);
    alert('Erro inesperado: ' + e.message); 
  }
}

function celulaHtmlListaChamada(participantes, presencas) {
  if (!participantes.length) {
    return '<p class="vazio" style="text-align:center; padding:20px">Adicione participantes na aba Participantes primeiro.</p>';
  }
  return participantes.map(p => {
    const reg = presencas.find(r => r.participante_id === p.id);
    const val = reg ? (reg.presente ? '1' : '0') : '';
    return `
      <div class="cel-chamada-row" id="cel-row-${p.id}">
        <div class="nome-col">
          ${p.nome}
          ${p.visitante_id && !p.membro_id ? '<span class="badge-vis">Visitante</span>' : ''}
        </div>
        <div class="cel-pf-wrap">
          <button class="cel-pf-btn" data-pid="${p.id}" data-val="1"
            onclick="window._cel.marcar(this)">P</button>
          <button class="cel-pf-btn" data-pid="${p.id}" data-val="0"
            onclick="window._cel.marcar(this)">F</button>
          <input type="hidden" id="cel-pres-${p.id}" value="${val}">
        </div>
      </div>
    `;
  }).join('');
}

function celulaPintar(participantes, presencas) {
  participantes.forEach(p => {
    const reg = presencas.find(r => r.participante_id === p.id);
    if (!reg) return;
    const val = reg.presente ? '1' : '0';
    const container = document.getElementById(`cel-row-${p.id}`);
    if (!container) return;
    const [btnP, btnF] = container.querySelectorAll('.cel-pf-btn');
    if (val === '1') { btnP?.classList.add('presente'); btnF?.classList.remove('faltou'); }
    else             { btnF?.classList.add('faltou');   btnP?.classList.remove('presente'); }
  });
}

function celulaMarcar(btn) {
  const pid = btn.dataset.pid;
  const val = btn.dataset.val;
  const row = document.getElementById(`cel-row-${pid}`);
  if (!row) return;
  const [btnP, btnF] = row.querySelectorAll('.cel-pf-btn');
  btnP.classList.remove('presente'); btnF.classList.remove('faltou');
  if (val === '1') btnP.classList.add('presente');
  else             btnF.classList.add('faltou');
  const hidden = document.getElementById(`cel-pres-${pid}`);
  if (hidden) hidden.value = val;
}

async function celulasTrocarData(novaData, grupoId) {
  sessionStorage.setItem(`cel_chamada_data_${grupoId}`, novaData);
  const { data: participantes } = await supabase

  const { data: presencas } = await supabase

  const lista = document.getElementById('cel-lista-chamada');
  if (lista) lista.innerHTML = celulaHtmlListaChamada(participantes || [], presencas || []);
  celulaPintar(participantes || [], presencas || []);
}

function celulaToggleVisitanteForm() {

async function celulaAdicionarVisitante(grupoId) {
  const nome = document.getElementById('cel-vis-nome')?.value?.trim();
  const fone = document.getElementById('cel-vis-fone')?.value?.trim();
  if (!nome) { alert('Informe o nome do visitante.'); return; }

  // 1. Cria o visitante na tabela visitantes
  const { data: novo, error: errV } = await supabase
    .from('visitantes').insert([{ nome, telefone: fone, tipo: 'Visitante' }]).select().single();
  if (errV) { alert('Erro ao cadastrar visitante: ' + errV.message); return; }

  // 2. Adiciona como participante da célula
  const { data: part, error: errP } = await supabase
    .from('membros_grupos').insert([{ grupo_id: grupoId, nome, visitante_id: novo.id }]).select().single();
  if (errP) { alert('Erro ao adicionar participante: ' + errP.message); return; }

  // 3. Já marca como presente na chamada atual
  const data = document.getElementById('cel-data-chamada')?.value || new Date().toISOString().slice(0, 10);
  sessionStorage.setItem(`cel_chamada_data_${grupoId}`, data);

  // Atualiza datalist global
  if (window._membrosCacheGlobal) {
    window._membrosCacheGlobal.push({ id: novo.id, nome, tipo: 'visitante' });
  }

  // 4. Re-renderiza a lista com o novo participante marcado
  const { data: participantes } = await supabase
    .from('membros_grupos').select('*').eq('grupo_id', grupoId).order('nome');
  const { data: presencas } = await supabase
    .from('presencas').select('*').eq('grupo_id', grupoId).eq('data', data);

  const lista = document.getElementById('cel-lista-chamada');
  if (lista) lista.innerHTML = celulaHtmlListaChamada(participantes || [], presencas || []);
  celulaPintar(participantes || [], presencas || []);

  // Marca o novo participante como presente automaticamente
  setTimeout(() => {
    const btnP = document.querySelector(`[data-pid="${part.id}"][data-val="1"]`);
    if (btnP) celulaMarcar(btnP);
  }, 100);

  // Limpa e fecha o form
  document.getElementById('cel-vis-nome').value = '';
  document.getElementById('cel-vis-fone').value = '';
  celulaToggleVisitanteForm();
  alert(`✅ ${nome} adicionado(a) como visitante e marcado(a) como presente!`);
}

async function celulaSalvarChamada(grupoId) {
  const data = document.getElementById('cel-data-chamada')?.value;
  if (!data) { alert('Selecione a data da reunião.'); return; }

  const regs = [];
  document.querySelectorAll('[id^="cel-pres-"]').forEach(hidden => {
    const participanteId = hidden.id.replace('cel-pres-', '');
    const val = hidden.value;
    if (val !== '') {
      regs.push({
        grupo_id: grupoId,
        participante_id: participanteId,
        data,
        presente: val === '1',
        tipo: 'celula'
      });
    }
  });

  if (regs.length === 0) {
    alert('Marque ao menos uma presença ou falta antes de salvar.');
    return;
  }

  // Apaga registros do dia e re-insere
  await supabase.from('presencas').delete().eq('grupo_id', grupoId).eq('data', data);
  const { error } = await supabase.from('presencas').insert(regs);
  if (error) {
    alert('Erro ao salvar: ' + error.message);
    return;
  }

  const presentes = regs.filter(r => r.presente).length;
  const faltas = regs.filter(r => !r.presente).length;

async function celulaRenderizarHistorico(grupoId) {
  const el = document.getElementById('cel-tab-conteudo');
  if (!el) return;
  el.innerHTML = '<p class="vazio" style="padding:20px; text-align:center">Carregando histórico...</p>';

  const { data: registros } = await supabase
    .from('presencas').select('*').eq('grupo_id', grupoId).eq('tipo', 'celula').order('data', { ascending: false });

  if (!registros?.length) {
    el.innerHTML = '<p class="vazio" style="padding:20px; text-align:center">Nenhuma chamada registrada ainda.</p>';
    return;
  }

  // Agrupa por data
  const porData = {};
  registros.forEach(r => {
    if (!porData[r.data]) porData[r.data] = [];
    porData[r.data].push(r);
  });

  const datas = Object.keys(porData).sort((a, b) => b.localeCompare(a));
  const totalReunioes = datas.length;
  const totalPresencas = registros.filter(r => r.presente).length;
  const mediaPresenca = totalReunioes ? Math.round(totalPresencas / totalReunioes) : 0;
  const { data: totalPart } = await supabase.from('membros_grupos').select('id', { count: 'exact' }).eq('grupo_id', grupoId);
  const nPart = totalPart?.length || 0;

  el.innerHTML = `
    <!-- Resumo -->
    <div class="cel-resumo-grid">
      <div class="cel-resumo-card">
        <div class="num">${totalReunioes}</div>
        <div class="leg">Reuniões<br>registradas</div>
      </div>
      <div class="cel-resumo-card">
        <div class="num">${nPart}</div>
        <div class="leg">Participantes<br>cadastrados</div>
      </div>
      <div class="cel-resumo-card">
        <div class="num">${mediaPresenca}</div>
        <div class="leg">Média de<br>presença</div>
      </div>
    </div>

    <!-- Lista de reuniões -->
    <div style="background:white; border-radius:12px; border:1px solid var(--border); overflow:hidden">
      <div style="background:var(--primary); color:white; padding:10px 16px; font-weight:700; font-size:0.85rem; display:flex; justify-content:space-between">
        <span>DATA DA REUNIÃO</span>
        <span style="display:flex; gap:30px">
          <span>PRESENTES</span>
          <span>AUSENTES</span>
          <span>TOTAL</span>
        </span>
      </div>
      ${datas.map(d => {
        const regs = porData[d];
        const pres = regs.filter(r => r.presente).length;
        const aus = regs.filter(r => !r.presente).length;
        const tot = regs.length;
        const pct = tot ? Math.round(pres * 100 / tot) : 0;
        const dataFmt = d.split('-').reverse().join('/');
        return `
          <div class="cel-hist-row" style="cursor:pointer" onclick="window._cel.detalharReuniao('${grupoId}','${d}')">
            <div>
              <strong>${dataFmt}</strong>
              <div style="margin-top:3px">
                <div style="width:120px; height:6px; background:#e2e8f0; border-radius:3px; display:inline-block; vertical-align:middle">
                  <div style="width:${pct}%; height:100%; background:#10b981; border-radius:3px"></div>
                </div>
                <span style="font-size:0.75rem; color:var(--text-muted); margin-left:6px">${pct}%</span>
              </div>
            </div>
            <div style="display:flex; gap:30px; text-align:center">
              <span class="cel-hist-badge verde">✔ ${pres}</span>
              <span class="cel-hist-badge amarelo">✗ ${aus}</span>
              <span style="font-weight:700; min-width:36px; text-align:center">${tot}</span>
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

async function celulaDetalharReuniao(grupoId, data) {
  const { data: regs } = await supabase
    .from('presencas').select('*').eq('grupo_id', grupoId).eq('data', data).order('presente', { ascending: false });
  const dataFmt = data.split('-').reverse().join('/');
  const pres = (regs || []).filter(r => r.presente);
  const aus  = (regs || []).filter(r => !r.presente);

  // Busca nomes dos participantes
  const { data: parts } = await supabase.from('membros_grupos').select('*').eq('grupo_id', grupoId);
  const nomeDe = pid => parts?.find(p => p.id === pid)?.nome || '—';

  const linhas = (regs || []).map(r => `
    <div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #f1f5f9; font-size:0.9rem">
      <span>${nomeDe(r.participante_id)}</span>
      <span class="cel-hist-badge ${r.presente ? 'verde' : 'amarelo'}">${r.presente ? '✔ Presente' : '✗ Ausente'}</span>
    </div>
  `).join('');

  const modal = document.createElement('div');
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px';
  modal.innerHTML = `
    <div style="background:white; border-radius:16px; width:100%; max-width:480px; max-height:80vh; overflow-y:auto; padding:24px; box-shadow:var(--shadow-lg)">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px">
        <h3 style="color:var(--primary); margin:0">Reunião de ${dataFmt}</h3>
        <button onclick="this.closest('div[style*=fixed]').remove()" style="border:none;background:none;font-size:1.5rem;cursor:pointer;color:#64748b">×</button>
      </div>
      <div style="display:flex; gap:10px; margin-bottom:16px">
        <span class="cel-hist-badge verde" style="font-size:0.9rem; padding:5px 14px">✔ ${pres.length} presentes</span>
        <span class="cel-hist-badge amarelo" style="font-size:0.9rem; padding:5px 14px">✗ ${aus.length} ausentes</span>
      </div>
      <div>${linhas || '<p class="vazio">Sem registros.</p>'}</div>
    </div>
  `;
  document.body.appendChild(modal);
  modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
}

async function gruposAddParticipante(id) {
  const el = document.getElementById('p-nome-grp');
  const nome = el?.value?.trim();
  if (!nome) { alert('Digite o nome antes de adicionar.'); return; }

  await garantirDatalistGlobal();
  const dl = document.getElementById('lista-Membros-geral');
  const opt = Array.from(dl.options).find(o => o.value === nome);

  if (opt) {
    const idRef = opt.dataset.id;
    const tipo = opt.dataset.tipo;
    if (tipo === 'membro') membroId = idRef;
    else visitanteId = idRef;
  } else {
    const { data: novoVisitante, error: errV } = await supabase
      .from('visitantes')
      .insert([{ nome: nome, tipo: 'Visitante' }])
      .select()
      .single();

    novaOpcao.value = nome;
    novaOpcao.dataset.id = novoVisitante.id;
    novaOpcao.dataset.tipo = 'visitante';
    dl.appendChild(novaOpcao);
  }

  const payload = { grupo_id: id, nome };
  if (membroId) payload.membro_id = membroId;
  if (visitanteId) payload.visitante_id = visitanteId;

  const { error } = await supabase.from('membros_grupos').insert([payload]);

  el.value = '';
  await gruposCarregarParticipantes(id);

function finAbrirModal(id = null) {
  _finId = id;
  const modal = document.getElementById('modal-lancamento');
  if (!modal) return;
  document.getElementById('modal-fin-titulo').textContent = id ? 'Editar lançamento' : 'Novo lançamento';

  if (!id) {
    // NOVO LANÇAMENTO
    supabase.from('lancamentos').select('data').order('data', { ascending: false }).limit(1)
      .then(({ data }) => { if (data?.[0]?.data) document.getElementById('fin-data').value = data[0].data; })
      .catch(() => document.getElementById('fin-data').value = new Date().toISOString().slice(0, 10));
    ['fin-contribuinte', 'fin-descricao', 'fin-valor-1', 'fin-valor-2', 'fin-valor-3', 'fin-obs'].forEach(i => {
      const el = document.getElementById(i);
      if (el) el.value = '';
    });
    document.getElementById('fin-tipo').value = _finTab || 'entrada';
    document.getElementById('fin-repeticao').value = 'único';
    document.getElementById('fin-qtd').value = '2';
    document.getElementById('fin-conta').value = 'Caixa';
    finToggleDescricao();
    finToggleRepeticao();
  } else {
    // EDIÇÃO: carrega dados
    supabase.from('lancamentos').select('*, membros(nome), visitantes(nome)').eq('id', id).single()
      .then(({ data }) => {
        if (!data) return;
        // 1. Define o tipo (entrada/saída)
        document.getElementById('fin-tipo').value = data.tipo;
        // 2. Recria o campo descrição (select para entrada, input para saída)
        finToggleDescricao();
        // 3. Preenche os campos básicos
        document.getElementById('fin-data').value = data.data?.slice(0, 10) || '';
        document.getElementById('fin-contribuinte').value = data.membros?.nome || data.visitantes?.nome || '';
        document.getElementById('fin-conta').value = data.conta || 'Caixa';
        document.getElementById('fin-obs').value = data.observacoes || '';
        document.getElementById('fin-valor-1').value = data.valor;
        document.getElementById('fin-cat-1').value = data.categoria || '';
        document.getElementById('fin-valor-2').value = '';
        document.getElementById('fin-valor-3').value = '';

        // 4. Preenche o campo de descrição (NÃO a categoria!)
        const descField = document.getElementById('fin-descricao');
        if (descField) {
          const valorDescricao = data.descricao || ''; // usa o campo 'descricao' do banco
          if (descField.tagName === 'SELECT') {
            // Se for select (entrada), tenta selecionar o valor. Se não existir, adiciona opção.
            let exists = false;
            for (let i = 0; i < descField.options.length; i++) {
              if (descField.options[i].value === valorDescricao) {
                exists = true;
                break;
              }
            }
            if (!exists && valorDescricao) {
              const opt = document.createElement('option');
              opt.value = valorDescricao;
              opt.textContent = valorDescricao;
              descField.appendChild(opt);
            }
            descField.value = valorDescricao;
          } else {
            // Se for input (saída)
            descField.value = valorDescricao;
          }
        }
        finToggleRepeticao();
      })
      .catch(err => console.error('Erro ao carregar lançamento:', err));
  }
  modal.classList.remove('hidden');
}

async function finSalvar() {
  const tipo = document.getElementById('fin-tipo').value;
  const desc = document.getElementById('fin-descricao').value.trim();
  const dataBase = document.getElementById('fin-data').value;
  const nomeCont = document.getElementById('fin-contribuinte').value.trim();
  const obs = document.getElementById('fin-obs').value;
  const repeticao = document.getElementById('fin-repeticao').value;
  const qtdRep = parseInt(document.getElementById('fin-qtd').value) || 1;
  const conta = document.getElementById('fin-conta').value;
  
  if (tipo === 'saida' && !desc) { alert('Preencha a descrição da despesa.'); return; }
  if (!dataBase) { alert('Preencha a data.'); return; }

  // Coleta os valores
  const lancamentos = [];
  for (let i = 1; i <= 3; i++) {
    const valEl = document.getElementById(`fin-valor-${i}`);
    const catEl = document.getElementById(`fin-cat-${i}`);
    if (valEl && catEl) {
      const val = parseFloat(valEl.value);
      if (val > 0) lancamentos.push({ valor: val, categoria: catEl.value });
    }
  }
  if (!lancamentos.length) { alert('Insira pelo menos um valor maior que zero.'); return; }

  try {
    let membro_id = null, visitante_id = null;
    if (nomeCont) {
      const norm = nomeCont.trim().toLowerCase();
      const { data: membros } = await supabase.from('membros').select('id, nome');
      const { data: visitantes } = await supabase.from('visitantes').select('id, nome');
      const encontrado = [...(membros || []), ...(visitantes || [])].find(p => p.nome.trim().toLowerCase() === norm);
      if (encontrado) {
        if (membros?.some(m => m.id === encontrado.id)) membro_id = encontrado.id;
        else visitante_id = encontrado.id;
      } else {
        const { data: novoV, error: errV } = await supabase
          .from('visitantes')
          .insert([{ nome: nomeCont, tipo: tipo === 'saida' ? 'Fornecedor' : 'Visitante' }])
          .select().single();
        if (errV) throw errV;
        visitante_id = novoV.id;
      }
    }

    // Se for edição (_finId existe), atualiza o lançamento existente
    if (_finId) {
      const primeiroLanc = lancamentos[0];
      const payload = {
        tipo,
        data: dataBase,
        descricao: desc,
        valor: primeiroLanc.valor,
        categoria: primeiroLanc.categoria,
        observacoes: obs,
        conta,
        membro_id,
        visitante_id
      };
      const { error } = await supabase.from('lancamentos').update(payload).eq('id', _finId);
      if (error) throw error;
    } 
    else {
      // Novo lançamento (pode ser parcelado)
      const loops = repeticao === 'único' ? 1 : qtdRep;
      for (let i = 0; i < loops; i++) {
        const dObj = new Date(dataBase + 'T12:00:00');
        dObj.setMonth(dObj.getMonth() + i);
        const dataFinal = dObj.toISOString().slice(0, 10);
        for (const l of lancamentos) {
          let dFinal = tipo === 'entrada' ? l.categoria : desc;
          if (loops > 1) dFinal += ` (${repeticao === 'parcelado' ? 'Parc.' : 'Ref.'} ${i+1}/${loops})`;
          const payload = {
            tipo, data: dataFinal, descricao: dFinal, valor: l.valor,
            categoria: l.categoria, observacoes: obs, conta,
            membro_id, visitante_id
          };
          const { error } = await supabase.from('lancamentos').insert([payload]);
          if (error) throw error;
        }
      }
    }
    finFecharModal();
    finCarregar();
    finCarregarSugestões();
  } catch (error) {
    console.error('Erro ao salvar lançamento:', error);
    alert('Erro ao salvar lançamento: ' + error.message);
  }
}

async function finCarregar() {
  const meses = document.getElementById('fin-meses')?.value;
  const ano = document.getElementById('fin-ano')?.value;
  if (!meses || !ano) return;
  const ultimoDia = new Date(ano, meses, 0).getDate();
  const ini = `${ano}-${String(meses).padStart(2, '0')}-01`;
  const fim = `${ano}-${String(meses).padStart(2, '0')}-${String(ultimoDia).padStart(2, '0')}`;
  const { data } = await supabase.from('lancamentos')
    .select('*, membros(nome), visitantes(nome)')
    .gte('data', ini)
    .lte('data', fim)
    .eq('tipo', _finTab)
    .order('data', { ascending: false });
  const { data: totalData } = await supabase.from('lancamentos').select('valor, tipo').gte('data', ini).lte('data', fim);
  const { data: pastData } = await supabase.from('lancamentos').select('valor, tipo').lt('data', ini);
  const saldoAnterior = (pastData || []).reduce((acc, l) => acc + (l.tipo === 'entrada' ? Number(l.valor) : -Number(l.valor)), 0);
  const fmt = v => Number(v).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
  const fd = d => d ? d.split('-').reverse().join('/') : '';
  const ent = (totalData || []).filter(l => l.tipo === 'entrada').reduce((s, l) => s + Number(l.valor), 0);
  const sai = (totalData || []).filter(l => l.tipo === 'saida').reduce((s, l) => s + Number(l.valor), 0);
  const sal = saldoAnterior + ent - sai;

  document.getElementById('fin-resumo').innerHTML = `
    <div class="fin-card" style="background:#f8fafc; border-left: 4px solid #94a3b8;"><span class="fin-label">SALDO ANTERIOR</span><span class="fin-valor">${fmt(saldoAnterior)}</span></div>
    <div class="fin-card entrada"><span class="fin-label">ENTRADAS DO MÊS</span><span class="fin-valor">${fmt(ent)}</span></div>
    <div class="fin-card saida"><span class="fin-label">SAÍDAS DO MÊS</span><span class="fin-valor">${fmt(sai)}</span></div>
    <div class="fin-card ${sal >= 0 ? 'positivo' : 'negativo'}"><span class="fin-label">SALDO ATUALIZADO</span><span class="fin-valor">${fmt(sal)}</span></div>
  `;

  // Gráfico do Mês
  const mesesNomes = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
  const titleMesEl = document.getElementById('fin-mes-chart-title');
  if (titleMesEl) titleMesEl.textContent = `Resumo de ${mesesNomes[parseInt(meses) - 1]}`;
  const ctxMes = document.getElementById('fin-mes-chart');
  if (ctxMes) {
    if (window._finChartMes) window._finChartMes.destroy();
    window._finChartMes = new Chart(ctxMes, {
      type: 'bar',
      data: { labels: ['Entradas', 'Saídas'], datasets: [{ data: [ent, sai], backgroundColor: ['#10b981', '#ef4444'], borderRadius: 4 }] },
      options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { beginAtZero: true, ticks: { callback: v => 'R$ ' + v.toLocaleString('pt-BR') } } } }
    });
  }

  // Gráfico do Ano
  const iniAno = `${ano}-01-01`;
  const fimAno = `${ano}-12-31`;
  const { data: anoData } = await supabase.from('lancamentos').select('valor, tipo, data').gte('data', iniAno).lte('data', fimAno);
  let totEntAno = 0, totSaiAno = 0;
  (anoData || []).forEach(l => { if (l.tipo === 'entrada') totEntAno += Number(l.valor); else totSaiAno += Number(l.valor); });
  const ctxAno = document.getElementById('fin-ano-chart');
  if (ctxAno) {
    if (window._finChartAno) window._finChartAno.destroy();
    window._finChartAno = new Chart(ctxAno, {
      type: 'bar',
      data: { labels: ['Entradas', 'Saídas'], datasets: [{ data: [totEntAno, totSaiAno], backgroundColor: ['#10b981', '#ef4444'], borderRadius: 4 }] },
      options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { beginAtZero: true, ticks: { callback: v => 'R$ ' + v.toLocaleString('pt-BR') } } } }
    });
  }

  // Resumo por categoria
  const cats = {};
  (totalData || []).forEach(l => { const cat = l.categoria || 'Outros'; if (!cats[cat]) cats[cat] = { entrada: 0, saida: 0 }; cats[cat][l.tipo] += Number(l.valor); });
  const maxV = Math.max(...Object.values(cats).flatMap(c => [c.entrada, c.saida]), 1);
  document.getElementById('fin-grafico').innerHTML = Object.entries(cats).length ?
    `<h4 style="margin:0 0 10px">Resumo por categoria (Geral)</h4>${Object.entries(cats).map(([cat, v]) =>
      `<div class="cat-row"><span class="cat-nome">${cat}</span><div class="cat-bars">${v.entrada ? `<div class="cat-bar bar-entrada" style="width:${Math.round(v.entrada / maxV * 100)}%"></div>` : ''}${v.saida ? `<div class="cat-bar bar-saida" style="width:${Math.round(v.saida / maxV * 100)}%"></div>` : ''}</div><span class="cat-total">${v.entrada ? '+' + fmt(v.entrada) : ''} ${v.saida ? '-' + fmt(v.saida) : ''}</span></div>`
    ).join('')}` : '';

  // Tabela de lançamentos
  const lista = document.getElementById('lista-lancamentos');
  if (!data?.length) {
    lista.innerHTML = `<p class="vazio">Nenhuma ${_finTab === 'entrada' ? 'entrada' : 'saída'} neste mês.</p>`;
    return;
  }
  const svgEdit = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>';
  const svgTrash = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>';
  lista.innerHTML = `
    <table class="tabela">
      <thead>
        <tr>
          <th>DATA</th>
          <th>PESSOA / FORNECEDOR</th>
          <th>CATEGORIA</th>
          <th>DESCRIÇÃO</th>
          <th>CONTA</th>
          <th>VALOR</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        ${data.map(l => {
          const nomePessoa = l.membros?.nome || l.visitantes?.nome || (l.tipo === 'entrada' ? 'Contribuinte' : 'Fornecedor');
          const descricao = l.descricao || '';
          const categoria = l.categoria || '';
          const conta = l.conta || 'Caixa';
          const valor = l.tipo === 'entrada' ? `+ ${fmt(Number(l.valor))}` : `- ${fmt(Number(l.valor))}`;
          return `
            <tr>
              <td style="padding:8px">${fd(l.data)}</td>
              <td><strong>${nomePessoa}</strong>${l.observacoes ? `<br><span class="hint">${l.observacoes}</span>` : ''}</td>
              <td>${categoria}</td>
              <td>${descricao}</td>
              <td><span class="badge" style="background:${conta === 'Banco' ? '#3498db' : '#2d6a4f'}">${conta}</span></td>
              <td class="valor-cel ${l.tipo}">${valor}</td>
              <td>
                <button class="btn-icon" onclick="window._fin.editar('${l.id}')">${svgEdit}</button>
                <button class="btn-icon btn-danger" onclick="window._fin.excluir('${l.id}')">${svgTrash}</button>
              </td>
            </tr>
          `;
        }).join('')}
      </tbody>
    </table>
  `;
}

function finMudarTab(tab) {
  _finTab = tab;
  const btnEnt = document.getElementById('tab-fin-entradas');
  const btnSai = document.getElementById('tab-fin-saidas');
  if (btnEnt) btnEnt.classList.toggle('ativo', tab === 'entrada');
  if (btnSai) btnSai.classList.toggle('ativo', tab === 'saida');
  finCarregar();
}

async function finEditar(id) {
  finAbrirModal(id);

async function finExcluir(id) {
  if (!confirm('Excluir lançamento financeiro?')) return;
  try {
    const { error } = await supabase.from('lancamentos').delete().eq('id', id);
    if (error) throw error;
    alert('Lançamento excluído!');
    finCarregar();
  } catch (error) {
    alert('Erro ao excluir: ' + error.message);
  }
}
